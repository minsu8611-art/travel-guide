 시럽+팬케이크 / 피우티네(감자+치즈+그레이비) / 캐나다 위스키."], ["숙소 분포", "밴프 타운: 레스토랑·쇼핑 편리, 중~고급. 레이크 루이스 빌리지: 루이스 호수 접근, 고급(샤토 레이크 루이스). 재스퍼 타운: 오로라 거점, 중급. 캠핑장: 국립공원 내 예약 필수(Parks Canada). 밴프 중급 호텔 1박 CAD 200~450."], ["주의사항", "① 곰 스프레이: 하이킹 필수 지참. 곰 만나면 천천히 물러서기. 음식 차량 내 방치 금지. ② 국립공원 입장권: 차량당 하루 CAD 11.7 or 연간 CAD 75 Discovery Pass 추천. ③ 겨울 운전: 4WD+스노타이어 필수, 렌터카 계약 시 확인. ④ 루이스 호수 주차: 여름 성수기 오전 6~8시 이전 도착 or 셔틀 이용."]], "연계": [["여행 패턴", "밴프+재스퍼 캐나다 로키 일주(5~7박) or 밴쿠버+밴프 연계(10박+)."], ["주요 연계 도시", "① 재스퍼: 아이스필드 파크웨이 드라이브 약 3.5시간. ② 캘거리: 차량 1.5시간. ③ 밴쿠버: 차량 9시간 or 비행기."], ["추천 조합", "5박6일: 밴프+재스퍼 로키 일주 / 7박8일: 밴쿠버3+밴프4 / 캐나다 로키 완전 일주 10박."]]}};
const RCOLORS={"일본":"#c0392b","동남아·대만·서남아":"#27ae60","말레이시아":"#1abc9c","유럽·아프리카":"#2980b9","중국·홍콩·몽골·중앙아시아":"#e67e22","미주·하와이·캐나다·중남미":"#34495e","호주·뉴질랜드":"#8e44ad","괌·사이판":"#16a085"};
const REMOJI={"일본":"🇯🇵","동남아·대만·서남아":"🌏","말레이시아":"🇲🇾","유럽·아프리카":"🇪🇺","중국·홍콩·몽골·중앙아시아":"🇨🇳","미주·하와이·캐나다·중남미":"🌎","호주·뉴질랜드":"🦘","괌·사이판":"🏝"};

function rc(r){for(const k of Object.keys(RCOLORS)){if(r===k||r.includes(k)||k.includes(r))return RCOLORS[k];}return"#555";}
function re(r){for(const k of Object.keys(REMOJI)){if(r===k||r.includes(k)||k.includes(r))return REMOJI[k];}return"🌐";}
function rk(r){for(const k of Object.keys(R)){if(r===k||r.includes(k)||k.includes(r))return k;}return null;}
function hex2rgba(h,a){const rv=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${rv},${g},${b},${a})`;}

// 항목이 [k,v] 배열이면 key-value 행, 문자열이면 bullet 행
function renderItem(item){
  if(Array.isArray(item)){
    const[k,v]=item;
    const vs=typeof v==='string'?v:String(v);
    return`<div class="row-item"><div class="row-k">${k}</div><div class="row-v">${vs.replace(/\n/g,'<br>')}</div></div>`;
  }
  return`<div class="row-item"><div class="row-k" style="min-width:0;color:#333;font-weight:400;padding-right:0"></div><div class="row-v">• ${String(item).replace(/\n/g,'<br>')}</div></div>`;
}
function renderRows(secs,color){
  return secs.map(([t,items])=>{
    const rows=items.map(item=>renderItem(item)).join('');
    return`<div class="sec-title" style="color:${color}">${t}</div>${rows}`;
  }).join('');
}

function panel(num,color,title,bodyFn,open){
  const id='p'+Math.random().toString(36).slice(2,8);
  return`<div class="panel">
    <div class="ph" onclick="tp('${id}')">
      <div class="ph-num" style="background:${color}">${num}</div>
      <div class="ph-title">${title}</div>
      <span class="ph-arr${open?' open':''}" id="arr_${id}">▼</span>
    </div>
    <div class="pb${open?' open':''}" id="${id}">${bodyFn()}</div>
  </div>`;
}
function tp(id){const b=document.getElementById(id),a=document.getElementById('arr_'+id);b.classList.toggle('open');a.classList.toggle('open');}

function showCity(name){
  const city=C[name];if(!city)return;
  document.querySelectorAll('.scb').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.scb').forEach(b=>{if(b.textContent===name)b.classList.add('on')});
  const color=rc(city.region),emoji=re(city.region),regKey=rk(city.region),reg=regKey?R[regKey]:null;
  const ex=EX[name]||null;

  const comBody=()=>COM.sections.map(([t,items])=>{
    const rows=items.map(item=>renderItem(item)).join('');
    return`<div class="sec-title" style="color:#1c1c2e">${t}</div>${rows}`;
  }).join('');

  // ② 지역 안내 — R[key].sections: [섹션명, [[k,v],...]] 구조
  const regBody=()=>{

  };

  // ③ 도시 핵심 정보 — city.sections: [섹션명, [문자열,...]] 구조
  const cityBody=()=>{
    let h=`<div class="row-item"><div class="row-k">최적 시기</div><div class="row-v">${city.best}</div></div>
      <div class="row-item"><div class="row-k">비자</div><div class="row-v">${city.visa}</div></div>
      <div class="row-item"><div class="row-k">항공</div><div class="row-v">${city.flight}</div></div>`;
    h+=renderRows(city.sections,color);
    return h;
  };

  // ④⑤⑥ extra — [k,v] 쌍 구조
  const kvRows=arr=>arr.map(([k,v])=>`<div class="row-item"><div class="row-k">${k}</div><div class="row-v">${v.replace(/\n/g,'<br>')}</div></div>`).join('');
  const noData=`<div class="row-item"><div class="row-k">안내</div><div class="row-v">준비 중입니다.</div></div>`;

  const flightBody=()=>(!ex||!ex.항공권)?noData:kvRows(ex.항공권);
  const foodBody  =()=>(!ex||!ex.음식숙소주의)?noData:kvRows(ex.음식숙소주의);
  const routeBody =()=>(!ex||!ex.연계)?noData:kvRows(ex.연계);

  document.getElementById('main').innerHTML=`<div class="cscreen">
    <div class="bc">
      <span onclick="showHome()">🏠 홈</span><span class="bc-sep">›</span>
      <span style="color:${color}">${emoji} ${city.region}</span><span class="bc-sep">›</span>
      <span style="font-weight:700">${name}</span>
    </div>
    <div class="chero" style="background:linear-gradient(135deg,${color}cc,${color}88)">
      <h2>${emoji} ${name}</h2>
      <div class="sub">${city.region}</div>
      <div class="badges">
        <span class="cbadge">🕐 ${city.best}</span>
        <span class="cbadge">🛂 ${city.visa}</span>
        <span class="cbadge">✈ ${city.flight}</span>
      </div>
      <div style="margin-top:12px">
        <button id="share-btn" onclick="copyShareLink('${name}')"
          style="background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.5);
                 color:#fff;padding:7px 16px;border-radius:20px;font-size:12px;
                 cursor:pointer;font-weight:600;transition:all .2s">
          🔗 이 도시 링크 공유
        </button>
      </div>
    </div>
    ${panel('①','#1c1c2e','해외여행 공통 준비사항',comBody,false)}
    ${reg?panel('②',color,`${emoji} ${regKey} 지역 안내`,regBody,false):''}
    ${panel('③',color,`${name} 핵심 명소 & 상세 가이드`,cityBody,true)}
    ${panel('④','#6c3483','항공권 & 성수기',flightBody,false)}
    ${panel('⑤','#1a5276','특산음식 · 숙소 · 주의사항',foodBody,false)}
    ${panel('⑥','#145a32','단일 vs 연계 여행',routeBody,false)}
  </div>`;
  document.getElementById('main').scrollTop=0;
}

function showHome(){
  document.querySelectorAll('.scb').forEach(b=>b.classList.remove('on'));
  history.replaceState(null,'',location.pathname);
  const rg={};
  for(const[c,d]of Object.entries(C))rg[d.region]=(rg[d.region]||[]).concat(c);
  const order=["일본","동남아·대만·서남아","말레이시아","유럽·아프리카","중국·홍콩·몽골·중앙아시아","미주·하와이·캐나다·중남미","호주·뉴질랜드","괌·사이판"];
  let cards='';
  for(const r of order){
    const cnt=(rg[r]||[]).length;if(!cnt)continue;
    const color=rc(r),emoji=re(r),light=hex2rgba(color,.1),sid='rg_'+r.replace(/[·\s]/g,'_');
    cards+=`<div class="rg-card" style="background:${light};color:${color}" onclick="tRG('${sid}')">
      <div class="emo">${emoji}</div><div class="nm">${r}</div><div class="ct">${cnt}개 도시</div></div>`;
  }
  let rows='';
  for(const r of order){
    const cities=(rg[r]||[]).sort();if(!cities.length)continue;
    const color=rc(r),emoji=re(r),light=hex2rgba(color,.1),sid='rg_'+r.replace(/[·\s]/g,'_');
    const pills=cities.map(c=>`<span class="cpill" style="background:${light};color:${color};border-color:${color}30" onclick="showCity('${c}')">${c}</span>`).join('');
    rows+=`<div class="rg-open" id="${sid}"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:16px">${emoji}</span><strong style="font-size:14px;color:${color}">${r}</strong></div><div class="rg-cities-row">${pills}</div></div>`;
  }
  document.getElementById('main').innerHTML=`<div class="home">
    <h2>여행 가이드 전체 목록</h2>
    <p>도시 선택 시 ① 공통 준비 → ② 지역 안내 → ③ 핵심 명소 → ④ 항공권·성수기 → ⑤ 음식·숙소·주의사항 → ⑥ 연계 여행 순으로 정리됩니다.</p>
    <div class="rg-grid">${cards}</div>${rows}</div>`;
}

function tRG(id){document.getElementById(id)?.classList.toggle('show');}
function tSG(id){document.getElementById('sg_'+id)?.classList.toggle('open');}

const allCities=Object.keys(C);
document.getElementById('si').addEventListener('input',function(){
  const q=this.value.trim(),sd=document.getElementById('sd');
  if(!q){sd.classList.remove('on');return;}
  const m=allCities.filter(c=>c.includes(q)||C[c].region.includes(q));
  if(!m.length){sd.classList.remove('on');return;}
  sd.innerHTML=m.slice(0,12).map(c=>`<div class="sri" onclick="showCity('${c}');this.closest('.srch-drop').classList.remove('on');document.getElementById('si').value=''">
    <span class="sc">${c}</span><span class="sr">${re(C[c].region)} ${C[c].region}</span></div>`).join('');
  sd.classList.add('on');
});
document.addEventListener('click',e=>{if(!e.target.closest('.srch'))document.getElementById('sd').classList.remove('on');});
showHome();

// ── 모바일 사이드바 토글
function toggleSidebar(){
  const sb = document.querySelector('.sidebar');
  const ov = document.getElementById('sb-overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('show');
}
function closeSidebar(){
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sb-overlay').classList.remove('show');
}
// 도시 선택 후 모바일에서 자동 닫기
const _origShowCity = showCity;
// showCity 내부에서 closeSidebar 호출하도록 래핑
document.addEventListener('click', function(e){
  const btn = e.target.closest('.scb');
  if(btn && window.innerWidth <= 600) closeSidebar();
});


// ── URL 해시 공유 기능
const BASE_URL = "https://minsu8611-art.github.io/travel-guide/";

// 페이지 로드 시 해시 읽어서 해당 도시 자동 오픈
function checkHash() {
  const hash = decodeURIComponent(location.hash.slice(1));
  if (hash && C[hash]) {
    showCity(hash);
  }
}
// showHome() 호출 직후 해시 확인 (showHome이 마지막에 실행되므로 그 뒤에 덮어씀)
document.addEventListener('DOMContentLoaded', function() {
  // showHome()이 실행된 뒤 해시 체크
  setTimeout(checkHash, 0);
});
// 브라우저 뒤로/앞으로 버튼 대응
window.addEventListener('popstate', checkHash);

// showCity 호출 시 URL 해시 업데이트 (기존 showCity 래핑)
const _showCity = showCity;
showCity = function(name) {
  _showCity(name);
  history.replaceState(null, '', '#' + encodeURIComponent(name));
};

// 공유 링크 복사
function copyShareLink(cityName) {
  const url = BASE_URL + '#' + encodeURIComponent(cityName);
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('share-btn');
    if (btn) {
      const orig = btn.innerHTML;
      btn.innerHTML = '✅ 복사됨!';
      btn.style.background = '#27ae60';
      setTimeout(() => {
        btn.innerHTML = orig;
        btn.style.background = '';
      }, 2000);
    }
  }).catch(() => {
    // clipboard API 실패 시 fallback
    const ta = document.createElement('textarea');
    ta.value = BASE_URL + '#' + encodeURIComponent(cityName);
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('링크가 복사됐습니다!\n' + ta.value);
  });
}

</script>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>여행바구니 해외여행 가이드 v3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f0efe8;color:#1a1a1a;font-size:14px}
.hdr{background:#1c1c2e;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.hdr h1{font-size:15px;font-weight:700;white-space:nowrap}
.hdr small{font-size:11px;color:#aaa;margin-left:4px}
.srch{margin-left:auto;position:relative}
.srch input{background:#2d2d46;border:1px solid #444;border-radius:20px;padding:6px 14px 6px 34px;color:#fff;font-size:13px;width:210px;outline:none}
.srch input:focus{border-color:#7c6af7}
.srch-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;color:#888}
.srch-drop{position:absolute;top:calc(100% + 5px);right:0;width:260px;background:#fff;border:1px solid #ddd;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.15);max-height:300px;overflow-y:auto;z-index:300;display:none}
.srch-drop.on{display:block}
.sri{padding:9px 14px;cursor:pointer;border-bottom:1px solid #f2f2f2;display:flex;justify-content:space-between;align-items:center}
.sri:hover{background:#f5f5ff}
.sri .sc{font-weight:600;font-size:13px}.sri .sr{font-size:11px;color:#888}
.wrap{display:flex;height:calc(100vh - 45px)}
.sidebar{width:185px;min-width:185px;background:#fff;border-right:1px solid #ddd;overflow-y:auto;flex-shrink:0}
.sg{border-bottom:1px solid #f0f0f0}
.sg-label{font-size:11px;font-weight:700;padding:9px 12px 6px;cursor:pointer;display:flex;align-items:center;gap:4px;user-select:none}
.sg-label:hover{background:#f9f9f9}
.sg-cnt{font-weight:400;color:#bbb;font-size:10px}
.sg-cities{padding:0 0 6px}
.scb{display:block;width:100%;text-align:left;padding:5px 12px 5px 22px;background:none;border:none;cursor:pointer;font-size:12.5px;color:#444;transition:background .1s}
.scb:hover{background:#f0f0f0;color:#111}
.scb.on{background:#eeeeff;color:#5b4fcf;font-weight:700}
.main{flex:1;overflow-y:auto;padding:20px 22px}
.home{max-width:900px;margin:0 auto}
.home h2{font-size:20px;font-weight:700;margin-bottom:6px}
.home p{color:#666;font-size:13px;margin-bottom:22px}
.rg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px;margin-bottom:22px}
.rg-card{border-radius:10px;padding:14px 16px;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.rg-card:hover{transform:translateY(-2px);border-color:rgba(0,0,0,.12)}
.rg-card .emo{font-size:22px;margin-bottom:5px}
.rg-card .nm{font-size:13px;font-weight:700}
.rg-card .ct{font-size:11px;opacity:.65;margin-top:2px}
.rg-open{margin-bottom:18px;display:none}
.rg-open.show{display:block}
.rg-cities-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.cpill{padding:5px 12px;border-radius:16px;font-size:12px;cursor:pointer;font-weight:500;border:1px solid transparent;transition:all .12s}
.cpill:hover{opacity:.8;transform:scale(1.04)}
.cscreen{max-width:900px;margin:0 auto}
.bc{font-size:12px;color:#999;margin-bottom:14px;display:flex;align-items:center;gap:5px}
.bc span{cursor:pointer}.bc span:hover{color:#5b4fcf}
.bc-sep{color:#ccc}
.chero{border-radius:10px;padding:18px 22px;margin-bottom:14px;color:#fff}
.chero h2{font-size:20px;font-weight:700;margin-bottom:3px}
.chero .sub{font-size:12px;color:rgba(255,255,255,.75)}
.chero .badges{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.cbadge{background:rgba(255,255,255,.18);padding:4px 10px;border-radius:12px;font-size:12px}
.panel{background:#fff;border-radius:10px;border:1px solid #e0e0da;margin-bottom:10px;overflow:hidden}
.ph{padding:11px 16px;display:flex;align-items:center;gap:8px;cursor:pointer}
.ph:hover{background:#fafaf8}
.ph-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.ph-title{font-size:14px;font-weight:700;flex:1}
.ph-arr{font-size:11px;color:#bbb;transition:transform .2s}
.ph-arr.open{transform:rotate(180deg)}
.pb{display:none;border-top:1px solid #f0f0ee;padding:2px 0 12px}
.pb.open{display:block}
.sec-title{font-size:11px;font-weight:700;color:#999;letter-spacing:.06em;padding:10px 16px 4px;text-transform:uppercase}
.row-item{padding:6px 16px;display:flex;gap:0;border-bottom:1px solid #f8f8f6}
.row-item:last-child{border-bottom:none}
.row-k{min-width:110px;font-size:12.5px;font-weight:600;color:#555;padding-right:10px;line-height:1.5;flex-shrink:0}
.row-v{font-size:13px;color:#222;line-height:1.7}
.summary-txt{padding:10px 16px 4px;font-size:13px;color:#555;font-style:italic;line-height:1.6}

/* 햄버거 버튼 — PC에서는 숨김 */
.menu-btn {
  display: none;
  background: none; border: none; cursor: pointer;
  flex-direction: column; gap: 5px; padding: 4px;
  flex-shrink: 0;
}
.menu-btn span {
  display: block; width: 20px; height: 2px;
  background: #fff; border-radius: 2px; transition: all .2s;
}

/* ── 모바일 세로 반응형 ── */
@media (max-width: 600px) {
  .hdr { padding: 10px 12px; gap: 8px; }
  .hdr h1 { font-size: 13px; }
  .hdr small { display: none; }
  .srch input { width: 130px; font-size: 12px; }

  /* 사이드바: 기본 숨김, 열렸을 때 오버레이 */
  .sidebar {
    position: fixed; top: 45px; left: 0;
    height: calc(100vh - 45px);
    width: 220px; min-width: 220px;
    transform: translateX(-100%);
    transition: transform .25s ease;
    z-index: 150;
    box-shadow: 4px 0 16px rgba(0,0,0,.18);
  }
  .sidebar.open { transform: translateX(0); }

  /* 오버레이 배경 */
  .sb-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.35); z-index: 140;
  }
  .sb-overlay.show { display: block; }

  /* 햄버거 버튼 */
  .menu-btn {
    display: flex !important;
  }

  /* 메인 영역 전체 너비 */
  .wrap { display: block; }
  .main { height: calc(100vh - 45px); padding: 14px 12px; }

  /* key-value 행: 좁은 화면에서 세로 배치 */
  .row-item { flex-direction: column; gap: 2px; padding: 7px 12px; }
  .row-k { min-width: 0; padding-right: 0; color: #888; font-size: 11.5px; }
  .row-v { font-size: 13px; }

  /* 섹션 타이틀 */
  .sec-title { padding: 10px 12px 4px; }

  /* 히어로 배지 줄바꿈 허용 */
  .chero { padding: 14px 14px; }
  .chero h2 { font-size: 17px; }
  .cbadge { font-size: 11px; padding: 3px 8px; }

  /* 홈 그리드 2열 */
  .rg-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }

  /* 패널 */
  .ph { padding: 10px 12px; }
  .ph-title { font-size: 13px; }
  .pb { padding: 0 0 10px; }

  /* 브레드크럼 */
  .bc { font-size: 11px; margin-bottom: 10px; }
}
</style>
</head>

const COM={"title": "해외여행 공통 준비사항", "sections": [["여권 & 비자", [["여권 유효기간", "출국일 기준 최소 6개월 이상 잔여 필요. 일부 국가(말레이시아·싱가포르·홍콩 등)는 3개월로 완화. 여행 전 반드시 확인."], ["비자 종류", "무비자 / 도착비자(VOA) / e비자(온라인 사전 신청) / 대사관 비자 4가지로 구분. ESTA(미국 $21) · eTA(캐나다 CAD7·호주 AUD20) · ETIAS(유럽 2026년 시행 예정) 등 전자여행허가 사전 신청 필수."], ["여권 분실 대비", "여권 사본 2부 + 여권용 사진 4장 별도 보관(가방·지갑 분리). 분실 시 현지 한국대사관 방문하여 여행증명서 발급."], ["입국 신고서", "국가별 기내 또는 입국장에서 작성. 미국 CBP Form I-94는 자동 처리. 숙소 주소·연락처 사전 메모 권장."]]], ["항공 & 수하물", [["항공권 예약 시기", "비수기 출발 2~3개월 전 / 성수기(여름·명절·설날) 6개월 전 예약 시 최저가. 화요일·수요일 검색이 저렴한 경향."], ["위탁 수하물", "항공사별 상이 (대형사 23kg 1개, 저가항공 15~20kg 유료). 초과 시 현장 kg당 수수료 부과. 출발 전 항공사 홈페이지 확인 필수."], ["기내 반입 금지", "보조배터리(160Wh 초과 금지)·라이터 위탁 불가 → 기내 반입만 허용. 액체류 100ml 이하 지퍼백 1개. 칼·가위류 위탁만 가능."], ["수하물 분실 대비", "공항 도착 즉시 짐이 없으면 수하물 클레임 데스크에서 PIR(분실신고서) 작성. 여행자보험 수하물 분실 특약으로 보상 가능."]]], ["환전 & 결제", [["환전 방법", "주거래 은행 앱 환전 후 공항 수령 — 환율 우대 70~90% 적용. 공항 환전소 현장 환전은 수수료 가장 높음."], ["해외 카드 수수료", "일반 신용카드 해외 수수료 1~1.5%. 트래블월렛·하나 트래블로그·카카오페이 외화카드 활용 시 수수료 절감 또는 면제."], ["현금 준비", "소액 USD 현금 상비 권장 (동남아·중남미 달러 통용). ATM 출금: 일본 세븐일레븐·이온 / 유럽 시내 ATM / 미국 현지 은행 ATM 이용 시 수수료 비교."], ["중국 결제", "위챗페이·알리페이 한국 카드 등록 가능(2023년부터 외국인 허용). 중국 내 현금 사용 어려워지는 추세 → 사전 등록 권장."]]], ["여행자보험", [["가입 필수 항목", "질병·상해 의료비(미국·유럽 무제한 권장) / 항공기 지연·취소 / 수하물 분실 / 배상책임 포함 상품 선택."], ["미국·캐나다 주의", "맹장수술 2,000~5,000만원, 골절 1,000만원 이상 발생 가능. 최소 1억원 이상 의료비 보장 상품 필수."], ["여행금지국 주의", "외교부 여행금지국(여행금지·철수권고) 방문 시 보험 적용 제외. 여행자제국은 보험 적용되나 사전 확인 권장."], ["가입 시기", "항공권 구매 직후 가입 — 출발 전 항공 취소·지연 특약 적용을 위해 조기 가입 필요."]]], ["통신 & 앱 준비", [["유심·이심", "출발 전 온라인 구매(클룩·와이파이도시락·유심사 등)가 공항보다 30~50% 저렴. 이심(eSIM) 지원 기기 확인 필수."], ["포켓 와이파이", "여러 명 동행 시 1대로 공유 가능. 배터리 관리 필요. 분실 시 보증금 차감."], ["필수 앱", "구글 맵(오프라인 지도 미리 다운로드) / 파파고·구글번역(오프라인 언어팩) / 그랩(동남아 택시) / 우버 / 현지 교통 앱."], ["VPN (중국)", "구글·카카오·유튜브·인스타그램 차단. 중국 입국 전 ExpressVPN·NordVPN 등 설치 필수. 중국 내 다운로드 불가."]]], ["건강 & 안전", [["필수 의약품", "소화제·지사제·진통제·종합감기약·밴드·모기기피제. 동남아·아프리카 여행 시 말라리아 예방약(출발 1~2주 전 복용 시작)."], ["음식 주의", "동남아·남아시아: 길거리 음식·얼음·생수 외 음용 주의. const EX={"도쿄": {"항공권": [["왕복 평균가격", "비수기: 40~70만원 / 성수기: 80~150만원. 직항 기준(인천↔나리타·하네다). 저가항공(진에어·티웨이) 비수기 30만원대 가능."], ["성수기 시기", "① 벚꽃(3월 말~4월 초): 일본 전국 최고 성수기, 전 세계 관광객 집중. ② 골든위크(4/29~5/5): 일본 최대 연휴, 내·외국인 수요 폭발. ③ 연말연시(12/28~1/3): 귀성+관광객 겹침."], ["비수기", "6월 장마, 9월 태풍 직후, 2월이 가장 저렴. 이 시기 30~50만원대 직항 가능."], ["예약 추천 시기", "벚꽃·골든위크: 최소 3~4개월 전. 비수기: 1~2개월 전도 가능. 연말연시: 2~3개월 전."]], "음식숙소주의": [["특산음식", "에도마에 스시(도요스·긴자) / 도쿄 스타일 라멘(쇼유·맑은 국물) / 몬자야키(도쿄 서민 철판 음식) / 닌교야키(아사쿠사 붕어빵 과자) / 도쿄 바나나(기념품 1위)."], ["숙소 분포", "신주쿠·시부야: 교통 허브·쇼핑 근접, 가장 수요 높음. 아사쿠사: 전통 분위기·스카이트리 근접. 긴자: 고급 비즈니스호텔 밀집. 우에노: 공항버스 접근 편리. 비즈니스호텔 8,000~15,000엔 / 4성 20,000~40,000엔."], ["주의사항", "① 쓰레기통 거의 없음 — 편의점·카페 외엔 없으니 작은 봉투 지참. ② 지하철 혼잡 시간(8~9시·18~19시) 큰 캐리어 이동 자제. ③ 에스컬레이터 도쿄는 왼쪽 서기(오사카 반대). ④ 음식점 예약 후 노쇼 시 패널티 증가 추세. ⑤ 100엔숍 카드결제 불가 매장 많음 — 현금 지참."]], "연계": [["여행 패턴", "단일 도쿄(3~4박)가 가장 많음. 도쿄 거점으로 근교 당일치기 조합도 매우 인기."], ["주요 연계 도시", "① 가마쿠라(대불·바다): JR 약 1시간, 당일치기. ② 하코네(온천·후지산): 로망스카 약 1.5시간, 1박 추천. ③ 닛코(화려한 신사): JR 약 2시간, 당일치기. ④ 교토·오사카: 신칸센 약 2.5시간, 황금 패키지."], ["추천 조합", "3박4일: 도쿄 단일 / 5박6일: 도쿄3+교토·오사카2 / 7박8일: 도쿄+하코네1박+교토·오사카."]]}, "오사카": {"항공권": [["왕복 평균가격", "비수기: 30~60만원 / 성수기: 70~130만원. 인천↔간사이(KIX). 저가항공 비수기 20만원대 가능."], ["성수기 시기", "① 벚꽃(3월 말~4월 초): 교토 연계 수요로 간사이 전체 최고 성수기. ② 골든위크(4/29~5/5). ③ 단풍(11월): 교토 연계로 인기 급증."], ["비수기", "6~7월 장마, 2월. 이 시기 20~40만원대 가능."], ["예약 추천 시기", "벚꽃·단풍: 3~4개월 전. 비수기: 1개월 전도 가능."]], "음식숙소주의": [["특산음식", "타코야키(문어 반죽 볼, 이키나리야·아이즈 등) / 오코노미야키(섞어 굽는 오사카식) / 쿠시카쓰(꼬치튀김) / 하코즈시(전통 상자 초밥) / 카이센동(쿠로몬 시장)."], ["숙소 분포", "난바: 도톤보리·쇼핑 도보권, 관광 중심. 우메다: 교통 허브·신오사카 신칸센 근접. 신세카이·텐노지: 저렴한 비즈니스호텔 밀집. 비즈니스 7,000~13,000엔 / 도쿄보다 10~20% 저렴."], ["주의사항", "① 에스컬레이터 오사카는 오른쪽 서기(도쿄 왼쪽과 반대) — 왼쪽 서면 핀잔. ② 쿠시카쓰 소스 이중 담금 절대 금지(현지 강력한 문화). ③ 도톤보리 야간 강변 음주 금지 구역 증가. ④ USJ 인기 어트랙션 대기 2~4시간 — 익스프레스패스 사전 구매 필수."]], "연계": [["여행 패턴", "오사카 단독(2박)보다 교토·나라·고베 연계(4~6박) 패키지가 압도적으로 많음."], ["주요 연계 도시", "① 교토: 전철 14~50분, 당일치기 or 1박. ② 나라: 전철 35~45분, 당일치기. ③ 고베: 전철 30분, 반나절. ④ 히메지: 신칸센 30분, 히메지성."], ["추천 조합", "3박4일: 오사카2+교토1 / 5박6일: 오사카2+교토2+나라 / 7박8일: 도쿄+교토+오사카 황금 루트."]]}, "교토": {"항공권": [["왕복 평균가격", "교토 자체 공항 없음. 간사이 공항(오사카) 이용. 비수기 30~60만원 / 성수기 70~130만원."], ["성수기 시기", "① 벚꽃(3월 말~4월 초): 전국 최고 성수기. ② 단풍(11월): 에이칸도·도후쿠지·키요미즈데라 — 벚꽃보다 숙박 조기 매진 심한 경우 있음. ③ 기온 마쓰리(7월 17일 야마보코 행렬): 당일 인파."], ["비수기", "1~2월 겨울. 인파 가장 적음. 설경 킨카쿠지 등 귀한 장면 가능."], ["예약 추천 시기", "단풍·벚꽃 료칸: 6개월~1년 전. 비수기: 1~2개월 전."]], "음식숙소주의": [["특산음식", "유도후(두부 요리, 교토 명물) / 니신소바(청어 소바) / 교야사이(교토 전통 채소 요리) / 오반자이(교토 가정식 반찬 뷔페) / 말차 디저트(기온 쓰지리·나나나나) / 아부리모치(이마미야 신사 앞 경단)."], ["숙소 분포", "기온·히가시야마: 전통 료칸·마치야 밀집, 관광 최적, 가장 비쌈. 교토역 주변: 신칸센 접근, 비즈니스호텔 다수. 아라시야마: 자연 속 고급 료칸. 료칸 1박 2식 25,000~100,000엔+."], ["주의사항", "① 게이샤·마이코 무단 촬영·접촉 시 조례 위반 벌금 가능(2024년 강화). ② 사찰 내 음식 섭취·걸으며 먹기 엄금. ③ 성수기 시내버스 초만원 — 자전거 대여 or 도보 계획 필수. ④ 료칸 체크인 시간(15~16시) 엄격, 지각 시 반드시 사전 연락."]], "연계": [["여행 패턴", "교토 단독(2~3박) or 오사카 거점 당일치기. 고급 여행자는 교토 중심 료칸 숙박."], ["주요 연계 도시", "① 오사카: 전철 14~50분. ② 나라: 전철 45분, 당일치기. ③ 고베: JR 약 1시간. ④ 히메지: 신칸센 30분. ⑤ 나고야: 신칸센 35분."], ["추천 조합", "3박4일: 교토 단독 / 5박6일: 교토2+오사카2+나라 / 7박8일: 도쿄+교토+오사카 황금 루트."]]}, "후쿠오카": {"항공권": [["왕복 평균가격", "비수기: 25~55만원 / 성수기: 60~110만원. 한국에서 가장 저렴한 일본 직항 노선 중 하나. 저가항공 경쟁 활발."], ["성수기 시기", "① 벚꽃(3월 말~4월 초). ② 골든위크. ③ 하카타 기온 야마카사(7월): 규슈 최대 축제, 기간 중 수요 상승. 전반적으로 연중 고른 수요 — 뚜렷한 단일 성수기 없음."], ["비수기", "1~2월이 상대적으로 저렴. 부산 페리 연계 수요로 연중 꾸준한 편."], ["예약 추천 시기", "성수기: 2~3개월 전. 비수기: 2~4주 전도 가능."]], "음식숙소주의": [["특산음식", "하카타 돈코츠 라멘(이치란·신신·잇푸도) / 모츠나베(소 내장+부추 전골) / 멘타이코(명란젓, 전국 원조) / 야키토리(나카스 야타이) / 하카타 우동(연하고 부드러운 면)."], ["숙소 분포", "하카타역 주변: 교통 허브, 비즈니스호텔 밀집. 텐진: 쇼핑·나이트라이프 중심. 나카스: 야타이 근접. 비즈니스 7,000~12,000엔 / 일본 주요 도시 중 저렴한 편."], ["주의사항", "① 야타이 좌석 소수 — 일찍 가거나 줄 서서 기다리기. ② 후쿠오카 공항 시내에서 지하철 5분 — 타 도시보다 이동 짧아 일정 착각 주의. ③ 하카타역·텐진 지하상가 미로 같음 — 앱 필수. ④ 부산 페리 귀국 시 탑승 2시간 전 도착 권장."]], "연계": [["여행 패턴", "후쿠오카 단독(2박) or 규슈 일주 거점. 부산 페리 국제 연계도 인기."], ["주요 연계 도시", "① 벳푸·유후인: 특급 1.5~2시간, 온천 1박. ② 나가사키: 신칸센+버스 약 1.5시간. ③ 구마모토: 신칸센 약 40분. ④ 다자이후: 전철 40분, 반나절. ⑤ 부산(한국): 페리 3~5.5시간."], ["추천 조합", "2박3일: 후쿠오카 단독 / 4박5일: 후쿠오카2+유후인·벳푸2 / 6박7일: 규슈 일주."]]}, "삿포로": {"항공권": [["왕복 평균가격", "비수기: 40~75만원 / 성수기: 90~160만원. 인천↔신치토세 직항."], ["성수기 시기", "① 라벤더 시즌(7~8월): 후라노·비에이 연계, 여름 수요 폭발. ② 눈축제(2월 초): 세계 관광객 집중, 숙박 3~5배 폭등. ③ 스키 시즌(12~3월): 외국인 증가. 2월이 오히려 성수기 최고가인 특이 구조."], ["비수기", "4~5월(눈 녹은 후), 10~11월(단풍 후). 이 시기 저렴하게 방문 가능."], ["예약 추천 시기", "눈축제: 6개월 전 필수. 여름: 3개월 전. 스키 시즌: 2~3개월 전."]], "음식숙소주의": [["특산음식", "삿포로 미소 라멘(홋카이도 원조) / 징기스칸(양고기 철판 구이) / 홋카이도 해산물(대게·성게·연어·방어) / 수프카레(삿포로에서 탄생한 음식) / 시로이코이비토(화이트 초콜릿 기념품 1위) / 홋카이도 유제품(버터·치즈·소프트아이스크림)."], ["숙소 분포", "스스키노·오도리: 관광·나이트라이프 중심. 삿포로역 주변: 교통 허브, 비즈니스호텔 다수. 눈축제 기간 숙박 3~5배 폭등, 수백km 주변까지 만실."], ["주의사항", "① 겨울 빙판길 — 미끄럼방지 밑창 방한화 필수, 일반 운동화 낙상 사고 빈번. ② 렌터카 겨울 운전 — 스노타이어·4WD 여부 확인 필수. ③ 눈축제 기간 숙박 없이 방문 절대 금물. ④ 후라노·비에이: 버스 불편, 렌터카 강력 권장."]], "연계": [["여행 패턴", "삿포로 단독(2~3박) or 홋카이도 일주(5~7박). 여름엔 후라노·비에이 필수 연계."], ["주요 연계 도시", "① 후라노·비에이: 특급+버스 or 렌터카 2시간. ② 노보리베츠: 특급 1.5시간, 지옥온천. ③ 하코다테: 특급 약 3.5시간, 남쪽 항구 도시. ④ 아사히카와: 특급 1.5시간, 아사히야마 동물원."], ["추천 조합", "3박4일: 삿포로+노보리베츠 / 5박6일: 삿포로+후라노·비에이+노보리베츠 / 7박8일: 홋카이도 전체 일주."]]}, "오키나와": {"항공권": [["왕복 평균가격", "비수기: 40~75만원 / 성수기: 90~160만원. 인천↔나하 직항. 저가항공 다수 운항."], ["성수기 시기", "① 여름(7~8월): 해변 최고 성수기, 단 태풍 시즌과 겹침. ② 벚꽃(1월 말~2월 초): 일본 최초 개화, 의외로 인기. ③ 골든위크. 실질 최적 시즌은 4~6월(태풍 전+맑음)."], ["비수기", "11~12월. 맑지만 수영하기엔 쌀쌀. 관광객 적고 숙박 저렴."], ["예약 추천 시기", "여름·골든위크: 3~4개월 전. 비수기: 1개월 전도 가능."]], "음식숙소주의": [["특산음식", "오키나와 소바(돼지뼈+두꺼운 면, 일본 소바와 전혀 다름) / 고야찬푸루(여주·두부·계란 볶음) / 라후테(돼지 삼겹살 조림) / 사타안다기(오키나와 도넛) / 오리온 맥주(현지 맥주) / 아와모리(오키나와 증류주)."], ["숙소 분포", "나하 국제거리: 저렴한 게스트하우스·비즈니스호텔. 온나손·북부 리조트 지역: 하얏트·힐튼·ANAインターコン 등 대형 리조트. 이시가키섬은 별도 예약. 리조트 1박 20,000~80,000엔+."], ["주의사항", "① 렌터카 없으면 북부·중부 이동 거의 불가 — 국제면허 필수, 성수기 예약 필수. ② 태풍 시즌(7~9월) 예고 없는 결항 — 항공 취소보험 필수. ③ 산호초 보호용 선크림 사용(오키나와현 규정, 특정 화학 성분 금지). ④ 하부뱀: 얀바루 북부 숲 주의."]], "연계": [["여행 패턴", "오키나와 본섬 단독(3~4박)이 가장 많음. 이시가키·미야코지마 추가도 인기."], ["주요 연계 도시", "① 이시가키섬: 국내선 약 50분. ② 미야코지마: 국내선 약 45분. ③ 게라마 제도: 페리 1시간, 당일 스노클링."], ["추천 조합", "3박4일: 본섬 단독 / 5박6일: 본섬3+이시가키2 / 7박8일: 본섬+미야코+이시가키 섬 일주."]]}, "이시가키섬": {"항공권": [["왕복 평균가격", "비수기: 50~90만원 / 성수기: 100~170만원. 인천↔신이시가키 직항(진에어 2025년 취항). 또는 오키나와 나하 경유."], ["성수기 시기", "① 골든위크(4/29~5/5): 일본 국내 수요 폭발. ② 여름(7~9월): 해양 액티비티 성수기, 단 태풍 위험. ③ 10~11월: 태풍 지나고 맑음+만타레이 시즌 겹침, 실질 최적."], ["비수기", "1~2월: 기온 낮고 바다 쌀쌀. 관광객 급감, 가격 저렴."], ["예약 추천 시기", "직항 편수 적음 — 성수기 3~4개월 전 예약 필수."]], "음식숙소주의": [["특산음식", "이시가키 와규(石垣牛, 일본 최고급 브랜드 소고기) / 야에야마 소바(이시가키 스타일) / 이시가키 단새우(甘エビ) / 흑당(사탕수수 원산지) / 미루쿠(해조류 요리)."], ["숙소 분포", "이시가키 시내: 비즈니스호텔·게스트하우스 다수, 렌터카·페리 접근 편리. 북부(가비라만 근처): 소규모 리조트. 여름 성수기 시내 호텔도 빠르게 매진 — 조기 예약 필수."], ["주의사항", "① 렌터카 없으면 이동 거의 불가 — 사전 예약 필수. ② 태풍 시즌 페리·투어 결항 잦음 — 일정 여유 1~2일 확보. ③ 가비라만 수영 절대 금지(강한 조류) — 글래스보텀 보트 only. ④ 다이빙 자격증 없으면 체험 다이빙 사전 예약 필수."]], "연계": [["여행 패턴", "이시가키 단독(3~4박) + 주변 섬 투어 조합이 정석."], ["주요 연계 도시", "① 다케토미섬: 페리 10분, 전통 류큐 마을+물소 수레. ② 이리오모테섬: 페리 35~50분, 정글+맹그로브. ③ 오키나와 본섬: 국내선 50분."], ["추천 조합", "3박4일: 이시가키 단독+섬 투어 / 5박6일: 오키나와3+이시가키2."]]}, "하코네·후지산": {"항공권": [["왕복 평균가격", "하코네·후지산 공항 없음. 도쿄 항공권과 동일: 비수기 40~70만원 / 성수기 80~150만원."], ["성수기 시기", "① 벚꽃(3월 말~4월 초): 가와구치코 벚꽃+후지산 배경 세계 포토스팟. ② 단풍(10~11월): 아시노코 단풍+후지산. ③ 후지산 등반 시즌(7월 초~9월 초)."], ["비수기", "1~2월: 관광객 적음, 설경 후지산 찍기엔 오히려 좋은 시기."], ["예약 추천 시기", "벚꽃·단풍 료칸: 6개월~1년 전. 인기 료칸은 1년 전도 부족할 수 있음."]], "음식숙소주의": [["특산음식", "오와쿠다니 구로타마고(유황 삶은 검은 달걀, 1개당 수명 7년 연장 전설) / 아유(은어) 소금구이(아시노코 주변) / 하코네 유두부 / 가와구치코 와사비 관련 상품 / 후지 지역 용암 바베큐."], ["숙소 분포", "하코네유모토: 가장 저렴, 소규모 료칸 많음. 고라·센고쿠하라: 고급 료칸·리조트 밀집. 아시노코반: 호수뷰 로맨틱 료칸. 가와구치코: 후지산뷰 료칸. 료칸 1박 2식 20,000~150,000엔+."], ["주의사항", "① 하코네 프리패스 없이 개별 교통비 매우 비쌈 — 반드시 사전 구매. ② 오와쿠다니 화산 활동 레벨에 따라 로프웨이 운행 중단 가능 — 방문 전 확인. ③ 후지산 등반: 시즌 외(10~6월) 5합목 이상 통제. ④ 타투 있으면 공중 온천 입장 불가 — 개인탕 예약."]], "연계": [["여행 패턴", "도쿄에서 1박2일 온천 여행이 가장 많음. 당일치기보다 료칸 1박 강력 추천."], ["주요 연계 도시", "① 도쿄: 로망스카 1.5시간, 도쿄 출발 1박2일 정석. ② 가와구치코: 버스 1시간, 후지산 탐방. ③ 오사카·교토: 신칸센 이용 시 중간 하차 가능."], ["추천 조합", "1박2일: 도쿄 출발 하코네 온천 / 3박4일: 도쿄2+하코네1박."]]}, "나라": {"항공권": [["왕복 평균가격", "나라 공항 없음. 간사이 공항(오사카) 이용. 오사카 항공권 동일: 비수기 30~60만원 / 성수기 70~130만원."], ["성수기 시기", "오사카·교토와 동일. 나라 자체적 성수기: 벚꽃(3~4월)·단풍(11월)·시카노코(새끼 사슴 탄생 5~6월). 나라 단독 목적 성수기는 없고 간사이 연계 방문."], ["비수기", "간사이 기준 동일. 나라는 당일치기 목적지라 항공 성수기 직접 영향 적음."], ["예약 추천 시기", "오사카·교토 숙박 기준 동일."]], "음식숙소주의": [["특산음식", "가키노하즈시(감잎 초밥, 나라 향토 명물) / 미와 소멘(나라 원조 소면) / 나라즈케(나라 채소 술지게미 절임) / 사슴 모양 과자."], ["숙소 분포", "나라는 대부분 오사카·교토 숙박 후 당일치기 방문. 나라역 주변 비즈니스호텔·료칸 소수. 단독 숙박 수요 매우 적음."], ["주의사항", "① 사슴에게 가키모치 외 음식(과자·빵 등) 주면 사슴 건강 해침+벌금 가능. ② 사슴 비닐봉지·지도 씹어먹음 — 손에 들고 다니면 빼앗김. ③ 사슴 뿔 찌르기 사고 주의 — 어린이·어르신 특히 조심. ④ 도다이지 입장 마감 시간 계절마다 다름(16:30~17:30)."]], "연계": [["여행 패턴", "나라 단독 1박 여행 드묾. 거의 대부분 오사카 or 교토에서 당일치기 방문."], ["주요 연계 도시", "① 오사카: 킨테쓰·JR 35~45분. ② 교토: 킨테쓰 45분. ③ 요시노산: 킨테쓰 약 1.5시간, 일본 최고 벚꽃 명소(4월 초)."], ["추천 조합", "오사카 or 교토 거점 반나절~1일. 호류지(세계최초 목조건축) 추가 시 하루 종일."]]}, "가나자와": {"항공권": [["왕복 평균가격", "비수기: 35~65만원 / 성수기: 70~120만원. 인천↔고마츠 공항(KMQ) 직항. 또는 도쿄 경유 호쿠리쿠 신칸센."], ["성수기 시기", "① 벚꽃(4월 초~중순): 겐로쿠엔·가나자와성. ② 겨울 설레(11월~3월): 겐로쿠엔 눈 가지 고정 장식, 외국인 관심 증가. ③ 골든위크. 도쿄·오사카보다 덜 혼잡."], ["비수기", "9~10월, 6~7월 장마철. 저렴하고 한산."], ["예약 추천 시기", "성수기: 2~3개월 전. 비수기: 1개월 전도 가능."]], "음식숙소주의": [["특산음식", "카이센동(제철 해산물 덮밥, 오미초 시장 명물) / 이시카와 대게(11~3월 시즌) / 노도구로(눈볼대, 고급 현지 어종) / 가나자와 커리(독특한 스타일) / 금박 아이스크림(히가시차야가이) / 지바라기(전통 과자)."], ["숙소 분포", "가나자와역 주변: 비즈니스호텔 밀집, 교통 편리. 히가시차야가이 근처: 소규모 부티크 료칸. 호쿠리쿠 신칸센 개통 후 수요 급증, 성수기 예약 어려워짐."], ["주의사항", "① 비가 자주 오는 도시 — 우산·우비 필수. ② 시내 버스 노선 복잡 — 조카마치 버스 1일권 구매 추천. ③ 21세기 미술관 2027~2028년 공사 예정, 방문 전 개관 여부 확인 필수. ④ 오미초 시장 일요일 일부 점포 휴무."]], "연계": [["여행 패턴", "가나자와 단독(2박) or 도쿄↔가나자와↔교토·오사카 호쿠리쿠 패스 루트 인기."], ["주요 연계 도시", "① 시라카와고: 버스 1.5시간, 세계유산 합장촌. ② 다카야마: 버스 2시간, 에도 목조 거리. ③ 교토: 특급 약 2.5시간. ④ 도쿄: 호쿠리쿠 신칸센 약 2.5시간."], ["추천 조합", "2박3일: 가나자와 단독 / 4박5일: 가나자와+다카야마+시라카와고 / 7박8일: 도쿄+가나자와+교토+오사카 호쿠리쿠 루트."]]}, "요코하마": {"항공권": [["왕복 평균가격", "요코하마 공항 없음. 도쿄 항공권과 동일: 비수기 40~70만원 / 성수기 80~150만원."], ["성수기 시기", "도쿄와 동일. 요코하마 단독 방문 드물고 도쿄 연계 당일치기가 대부분. 크리스마스(12월) 아카렌가 마켓은 오히려 인기 상승."], ["비수기", "도쿄 기준 동일."], ["예약 추천 시기", "도쿄 숙박 기준 동일. 요코하마 단독 숙박(미나토미라이 야경 목적): 1~2개월 전."]], "음식숙소주의": [["특산음식", "요코하마 차이나타운 중화요리(딤섬·월병·북경오리) / 이에계 라멘(요코하마 발상지) / 요코하마 커피(항구 도시 커피 문화 깊음) / 슈마이(중화 찐만두, 기념품)."], ["숙소 분포", "미나토미라이: 고급 호텔(로열파크·인터콘티넨탈) 야경뷰. 사쿠라기초·칸나이: 중급 비즈니스호텔. 요코하마역 주변: 체인 호텔 다수. 대부분 도쿄 숙박 후 당일치기."], ["주의사항", "① 차이나타운 주말 혼잡 극심 — 평일 방문 추천. ② 오산바시 국제터미널 옥상이 야경 최고 무료 포인트. ③ 가마쿠라 연계 시 에노시마 전철 주말 혼잡 — 아침 일찍 출발."]], "연계": [["여행 패턴", "도쿄에서 당일치기 절대 다수. 1박은 야경·크리스마스 목적 소수."], ["주요 연계 도시", "① 도쿄: 전철 25~30분. ② 가마쿠라: JR 약 25분, 대불+해변. ③ 에노시마: 에노시마 전철 30분."], ["추천 조합", "도쿄 체류 중 반나절~1일: 요코하마+가마쿠라 / 야경 목적 1박."]]}, "나고야": {"항공권": [["왕복 평균가격", "비수기: 30~60만원 / 성수기: 65~120만원. 인천↔나고야 중부 국제공항(NGO) 직항."], ["성수기 시기", "① 벚꽃(3월 말~4월 초): 나고야성·쓰루마 공원. ② 골든위크. 비즈니스 수요가 큰 도시라 관광 성수기 편차 비교적 적음."], ["비수기", "1~2월, 6월 장마. 20~40만원대 가능."], ["예약 추천 시기", "성수기: 2~3개월 전. 비수기: 1개월 전도 가능."]], "음식숙소주의": [["특산음식", "히쓰마부시(장어덮밥, 3가지 방식: 그냥·파+고추냉이·오차즈케) / 미소카쓰(된장 돈가스, 야바톤 유명) / 테바사키(달콤매콤 튀긴 닭날개) / 모닝 서비스(커피+두꺼운 토스트+삶은 달걀, 세계 최고 아침 문화) / 안카케 스파(걸쭉한 소스 스파게티)."], ["숙소 분포", "나고야역 주변: 교통 허브, 비즈니스호텔 밀집. 사카에·나카구: 쇼핑·번화가 근접. 비즈니스 7,000~13,000엔 / 도쿄·오사카보다 저렴."], ["주의사항", "① 나고야 지하철 노선 복잡 — 초행자 앱 필수. ② 모닝 서비스: 오전 11시 전 카페 방문해야 이용 가능. ③ 도요타 박물관 등 외곽 명소: 이동 시간 계획 필수."]], "연계": [["여행 패턴", "나고야 단독(1~2박) or 도쿄↔나고야↔교토·오사카 중간 거점."], ["주요 연계 도시", "① 교토: 신칸센 35분. ② 도쿄: 신칸센 1.5시간. ③ 이세신궁: 특급 1.5시간, 일본 최고 신사. ④ 시라카와고: 버스 2.5시간."], ["추천 조합", "1~2박: 나고야 단독 / 도쿄↔나고야↔교토 패키지 중간 1박."]]}, "고베": {"항공권": [["왕복 평균가격", "고베 공항 국내선 전용(인천 직항 없음). 간사이 공항 이용. 오사카 항공권 동일: 비수기 30~60만원 / 성수기 70~130만원."], ["성수기 시기", "오사카·교토와 동일. 고베 자체 성수기: 루미나리에(12월) — 이탈리아 전구 조형물 축제, 특별 수요."], ["비수기", "1~2월. 루미나리에 이후 가장 한산."], ["예약 추천 시기", "루미나리에(12월) 숙박: 3~4개월 전. 일반: 1개월 전."]], "음식숙소주의": [["특산음식", "고베 비프(세계 3대 소고기, 런치 5,000~8,000엔) / 아카시야키(문어 달걀 찜, 타코야키 원조) / 난킨마치 돼지만두·중화 요리 / 고베 와인(롯코산 와이너리) / 고베 푸딩(기념품)."], ["숙소 분포", "산노미야: 교통 허브, 비즈니스·중급 호텔 다수. 기타노: 이진칸 근처 부티크 호텔. 고베 단독 숙박보다 오사카 숙박 후 당일치기가 多."], ["주의사항", "① 고베 비프 인증점 확인 — 무허가 '고베 비프' 표방 식당 많음. ② 기타노이진칸 유료 시설 여러 개 — 통합권 구매 추천. ③ 오사카에서 당일치기 시 저녁 막차 시간 확인."]], "연계": [["여행 패턴", "오사카 or 교토 거점에서 반나절~1일 당일치기."], ["주요 연계 도시", "① 오사카: 한신·JR 약 30분. ② 교토: JR 약 1시간. ③ 히메지: JR 약 30분, 세계유산 히메지성."], ["추천 조합", "오사카 3박+고베 반나절 포함 / 오사카+고베+히메지 하루 코스."]]}, "벳푸·유후인": {"항공권": [["왕복 평균가격", "비수기: 35~65만원 / 성수기: 75~130만원. 인천↔오이타 공항(OIT) 직항 or 후쿠오카 경유."], ["성수기 시기", "① 가을 단풍(10~11월): 온천+단풍 조합 최고. ② 겨울(12~2월): 눈 내리는 노천탕 체험으로 오히려 인기 상승. ③ 봄 벚꽃(3~4월). 온천 목적지라 연중 고른 수요."], ["비수기", "뚜렷한 비수기 없음. 6~7월 장마철 상대적으로 저렴."], ["예약 추천 시기", "인기 료칸: 3~6개월 전. 단풍·연말: 6개월 전."]], "음식숙소주의": [["특산음식", "도리텐(닭 튀김, 오이타 발명품) / 지고쿠 무시(지옥 증기로 찐 음식 — 달걀·옥수수·닭) / 벳푸 냉면(온천 지역 특유) / 유후인 롤케이크(디저트 명물) / 오이타 시이타케(표고버섯 산지)."], ["숙소 분포", "벳푸: 비즈니스호텔~고급 료칸 다양, 지옥온천 관광 거점. 유후인: 소규모 료칸·펜션 집중, 아기자기, 벳푸보다 비쌈. 료칸 1박 2식 15,000~80,000엔+, 노천 온천 딸린 객실 인기."], ["주의사항", "① 타투 있으면 공중 목욕탕 입장 불가 — 개인탕(가시키리) 예약 필요. ② 유후인노모리 열차 사전 예약 필수, 당일 좌석 거의 없음. ③ 지옥온천: 실제 입욕 불가(너무 뜨거움), 관람만 가능. ④ 벳푸↔유후인: 버스 약 50분."]], "연계": [["여행 패턴", "후쿠오카 거점 1박2일 온천 여행. 벳푸+유후인 연계 2박3일도 인기."], ["주요 연계 도시", "① 후쿠오카: 특급 1.5~2시간. ② 구마모토: 특급+버스, 구마모토성+아소산. ③ 아소산: 렌터카 약 2시간, 세계 최대 칼데라."], ["추천 조합", "후쿠오카 거점 1박2일 / 3박4일: 후쿠오카1+유후인1+벳푸1 / 규슈 일주 포함."]]}, "히로시마": {"항공권": [["왕복 평균가격", "비수기: 40~70만원 / 성수기: 80~140만원. 인천↔히로시마 공항(HIJ) 직항 제한적. 주로 오사카(간사이) or 후쿠오카 경유 신칸센."], ["성수기 시기", "① 벚꽃(3월 말~4월 초). ② 8월 6일 피폭 기념일 전후. ③ 미야지마 단풍(11월). 역사 여행 목적 방문자는 계절 크게 타지 않는 편."], ["비수기", "1~2월. 역사 여행 목적 방문자 계절 무관."], ["예약 추천 시기", "벚꽃·단풍: 2~3개월 전. 비수기: 1개월 전."]], "음식숙소주의": [["특산음식", "히로시마 오코노미야키(층층이 쌓는 스타일, 도쿄식과 완전 다름) / 굴(카키, 전국 생산 1위) / 아나고메시(붕장어 덮밥, 미야지마 명물) / 모미지만쥬(단풍잎 찹쌀 과자, 기념품 1위) / 세토내해 레몬 상품."], ["숙소 분포", "히로시마역 주변: 비즈니스호텔 다수, 신칸센 편리. 나카마치·혼마치: 시내 중심 중급 호텔. 미야지마 섬: 소수 료칸, 1박 여유 여행자 추천."], ["주의사항", "① 원폭 돔·평화기념공원 주변 큰 소리·장난 자제 — 현지인 정서. ② 미야지마 입도 보전 비용 300엔(2023년 신설). ③ 미야지마 밀물·썰물 시간 확인 필수 — 밀물 때 해상 도리이, 썰물 때 도보 접근. ④ 굴 생식 주의 — 익힌 메뉴 추천."]], "연계": [["여행 패턴", "오사카·교토 거점 신칸센 당일치기 or 1박."], ["주요 연계 도시", "① 미야지마: 페리 10분, 반나절~1박. ② 오사카: 신칸센 1.5시간. ③ 후쿠오카: 신칸센 50분. ④ 야마구치(모토노스미 신사): 신칸센 20분."], ["추천 조합", "오사카 거점 당일치기 / 후쿠오카↔히로시마 1박2일."]]}, "방콕": {"항공권": [["왕복 평균가격", "비수기: 30~60만원 / 성수기: 65~120만원. 인천↔수완나품(BKK) or 돈므앙(DMK) 직항. 저가항공(에어아시아·타이라이온에어) 비수기 20만원대 가능."], ["성수기 시기", "① 건기(11~4월): 맑고 쾌청, 관광객 폭증. 특히 12~2월 최고성수기. ② 송크란(4월 13~15일): 물 축제 기간 전 세계 여행자 집중. ③ 크리스마스·연말: 유럽 여행자 최고 수요."], ["비수기", "우기(5~10월): 하루 한두 번 스콜. 여행 가능하나 저렴함. 7~8월 최저가."], ["예약 추천 시기", "건기 성수기: 2~3개월 전. 송크란: 3~4개월 전. 우기: 2~4주 전도 가능."]], "음식숙소주의": [["특산음식", "팟타이(볶음 쌀국수) / 똠양꿍(새우 레몬그라스 수프) / 그린커리·마사만커리 / 솜땀(파파야 샐러드) / 카오만가이(닭고기 덮밥) / 망고 찹쌀 / 파드 카파오(바질 볶음밥)."], ["숙소 분포", "수쿰빗(아쏙·나나·프롬퐁): BTS 연결, 외국인 밀집, 중~고급. 실롬·사통: 비즈니스·나이트라이프. 카오산 로드: 배낭여행자 게스트하우스. 차오프라야 강변: 고급 리조트(오리엔탈·샹그릴라). 중급 호텔 1박 2,000~5,000바트."], ["주의사항", "① 툭툭이 보석상·수트 사기 — 어디서든 '오늘만 특가' 안내는 무조건 거절. ② 왕궁·사원 복장 규정 엄격 — 어깨·무릎 가리기 필수(천 대여 가능). ③ 왕실 불경죄 최대 15년 징역 — 왕실 관련 모든 발언 극도 주의. ④ 택시 미터기 켜는지 확인 — 안 켜면 그랩 이용. ⑤ 사원 주변 가짜 가이드 접근 주의."]], "연계": [["여행 패턴", "방콕 단독(3~4박) or 방콕+파타야/푸켓/치앙마이 국내선 연계."], ["주요 연계 도시", "① 파타야: 버스 2시간, 당일 or 1박. ② 아유타야: 버스·기차 1.5시간, 당일치기. ③ 치앙마이: 국내선 1시간, 방콕과 완전 다른 북부 문화. ④ 후아힌: 버스 3시간, 태국 왕실 해변 리조트."], ["추천 조합", "3박4일: 방콕 단독 / 5박6일: 방콕3+파타야or치앙마이 / 7박8일: 방콕+치앙마이+푸켓 삼각 루트."]]}, "치앙마이": {"항공권": [["왕복 평균가격", "비수기: 40~75만원 / 성수기: 75~130만원. 인천↔치앙마이(CNX) 직항 or 방콕 경유."], ["성수기 시기", "① 건기(11~4월): 방콕과 동일, 특히 12~2월. ② 이팽(Yi Peng) 연등 축제(11월 보름): 수만 개 등불이 밤하늘 수놓음 — 전 세계 버킷리스트 1위 이벤트. 이 기간 숙박 매우 비쌈. ③ 송크란(4월): 치앙마이 축제 규모 방콕 못지않음."], ["비수기", "3~4월: 연기 시즌(소각 관행으로 미세먼지 심함). 우기(5~10월): 저렴하나 비 잦음."], ["예약 추천 시기", "이팽 축제: 6개월~1년 전. 건기 성수기: 2~3개월 전."]], "음식숙소주의": [["특산음식", "카오소이(코코넛 카레 국수, 치앙마이 특산) / 남프릭(태국 북부 칠리 딥 소스) / 싸이우아(북부 스타일 소시지) / 깽항레(돼지 복부 카레) / 칸똑 디너(전통 북부 코스 요리)."], ["숙소 분포", "올드시티(성벽 내): 부티크 호텔·게스트하우스 밀집, 전통 분위기. 님만해민: 트렌디 카페·부티크 호텔. 나이트바자르 근처: 쇼핑 편리 중급 호텔. 장기 체류자 선호 코워킹 호텔 다수."], ["주의사항", "① 3~4월 연기 시즌 미세먼지 극심 — 호흡기 질환자 비추천. ② 코끼리 캠프 선택 시 탑승·공연 강요 비윤리적 캠프 피하기(엘리펀트 네이처 파크 등 윤리적 캠프 추천). ③ 오토바이 렌트 사고 증가 — 국제면허 필수, 보험 확인. ④ 고산지대 소수민족 마을 방문 시 무분별한 사진 촬영 삼가."]], "연계": [["여행 패턴", "치앙마이 단독(3~4박) or 방콕 거점 국내선 연계."], ["주요 연계 도시", "① 방콕: 국내선 1시간. ② 치앙라이: 버스 3~4시간, 화이트 템플(왓롱쿤). ③ 팍배(매홍손): 버스 or 소형기, 골든 트라이앵글 인접. ④ 루앙프라방(라오스): 버스 이동 or 국내선."], ["추천 조합", "3박4일: 치앙마이 단독 / 5박6일: 방콕3+치앙마이2 / 7박8일: 방콕+치앙마이+루앙프라방."]]}, "파타야": {"항공권": [["왕복 평균가격", "파타야 자체 공항 없음(우타파오 소형 공항 있음). 방콕 항공권 동일: 비수기 30~60만원 / 성수기 65~120만원."], ["성수기 시기", "방콕과 동일. 건기 11~4월. 특히 12~2월."], ["비수기", "우기 5~10월. 바다 흐리고 비 잦음. 해변 목적 비추천."], ["예약 추천 시기", "방콕 기준 동일."]], "음식숙소주의": [["특산음식", "씨푸드(파타야 해산물 직거래) / 태국 BBQ / 파타야 스타일 팟타이 / 노점 꼬치·과일."], ["숙소 분포", "비치로드: 파타야 비치 근접, 중저급 호텔 밀집. 조메티엔 비치: 한적하고 고급 리조트. 워킹 스트리트 인근: 성인 나이트라이프 근접(가족 비추천). 1박 1,500~8,000바트."], ["주의사항", "① 워킹 스트리트: 성인 유흥가 — 가족·어린이 동반 피하기. ② 제트스키 사기(손상 바가지 요금) 빈번 — 반드시 영수증 확인, 사전 사진 촬영. ③ 해변 마사지: 위생 상태 확인 필요. ④ 가짜 관광 명소 안내 사기 주의."]], "연계": [["여행 패턴", "방콕 거점 파타야 1~2박 or 방콕→파타야 일정 마지막에 추가."], ["주요 연계 도시", "① 방콕: 버스 2시간. ② 코사무에: 국내선. ③ 꼬창: 버스+페리 약 4~5시간, 자연 섬."], ["추천 조합", "방콕3+파타야1~2 / 방콕+파타야+코사무이 연계."]]}, "푸켓·끄라비": {"항공권": [["왕복 평균가격", "비수기: 35~70만원 / 성수기: 75~140만원. 인천↔푸켓(HKT) 직항. 진에어·제주항공·타이항공 등."], ["성수기 시기", "① 건기(11~4월): 안다만해 맑음, 관광객 최고조. 12~2월 최성수기. ② 성탄·연말: 유럽·러시아 여행자 급증."], ["비수기", "우기(5~10월): 파도 높고 투어 결항. 일부 리조트 임시 휴업. 단, 가격 40~50% 저렴."], ["예약 추천 시기", "12~2월: 3~4개월 전. 건기 전반: 2~3개월 전."]], "음식숙소주의": [["특산음식", "카놈진(쌀국수+카레 소스, 푸켓 아침 명물) / 푸켓 타운 올드타운 딤섬(중국계 페라나칸 문화) / 마삼만 커리(진한 코코넛 카레) / 씨푸드 바비큐(까따 해변 주변) / 뚜아통(호박 과자, 푸켓 특산)."], ["숙소 분포", "파통 비치: 가장 번화, 중저급~고급 혼재. 까따·까론: 조용하고 가족 친화. 수린·라구나: 고급 리조트 밀집. 푸켓 타운: 저렴한 부티크 호텔. 성수기 고급 리조트 1박 10,000~50,000바트+."], ["주의사항", "① 5~10월 우기: 파도 높아 투어·보트 결항 많음 — 일정 여유 확보. ② 코사무이(타이만 건기 12~4월)와 시즌 반대 — 혼동 주의. ③ 오토바이 렌트 사고 빈번 — 보험 없으면 사고 시 전액 본인 부담. ④ 모조 명품 구매: 관세법 위반, 한국 입국 시 적발 가능."]], "연계": [["여행 패턴", "푸켓 단독(4~5박) or 푸켓+끄라비 연계(6~8박). 페리로 이동 가능."], ["주요 연계 도시", "① 끄라비: 페리 or 버스 2시간. 레일레이 해변+4섬 투어. ② 코피피: 페리 1.5시간, 피피돈+마야베이. ③ 코란따: 페리 2~3시간, 조용한 섬. ④ 방콕: 국내선 1.5시간."], ["추천 조합", "4박5일: 푸켓 단독 / 6박7일: 푸켓4+끄라비2 / 7박8일: 방콕1+푸켓4+끄라비2."]]}, "코사무이": {"항공권": [["왕복 평균가격", "비수기: 50~90만원 / 성수기: 90~160만원. 인천→방콕(BKK) 경유→사무이 국내선. 직항 없음. 경유 포함 총 8~10시간."], ["성수기 시기", "① 타이만 건기(12~4월): 코사무이 맑음. 이 시기 유럽·러시아 여행자 폭증. ② 주의: 11~12월은 오히려 타이만 우기 시작 — 푸켓 건기와 반대!"], ["비수기", "우기(5~11월): 비 잦고 파도 높음. 특히 10~11월 최고 우기."], ["예약 추천 시기", "12~4월 건기: 3~4개월 전. 허니문·고급 리조트: 6개월 전."]], "음식숙소주의": [["특산음식", "씨푸드(새우·가재·조개 BBQ) / 코코넛 카레(사무이 스타일) / 망고 찹쌀 / 팟타이."], ["숙소 분포", "차웽 비치: 가장 번화, 쇼핑·나이트라이프 근접. 라마이 비치: 차웽보다 조용, 배낭+가족 혼재. 보풋(피셔맨스 빌리지): 감성적, 커플·허니문 선호. 리조트 1박 3,000~30,000바트+."], ["주의사항", "① 타이만(사무이) 우기는 11~12월 — 푸켓 건기와 반대, 반드시 구분해서 안내. ② 사무이 공항 방콕방이 운영(비쌈) — 방콕에어웨이즈 독점 구간. ③ 코팡안 풀문파티 귀중품 도난 빈번 — 최소 소지품으로 참가."]], "연계": [["여행 패턴", "코사무이 단독(4~5박) or 방콕 경유 연계."], ["주요 연계 도시", "① 코팡안: 페리 30분, 풀문파티·스노클링. ② 앙통 국립공원: 스피드보트 1시간, 당일 투어. ③ 방콕: 국내선 1시간. ④ 사무이↔푸켓: 국내선 직항 or 방콕 경유."], ["추천 조합", "4박5일: 코사무이 단독 / 6박7일: 방콕2+코사무이4 / 코팡안 풀문파티 연계 1박."]]}, "다낭": {"항공권": [["왕복 평균가격", "비수기: 25~50만원 / 성수기: 55~110만원. 인천↔다낭(DAD) 직항. 저가항공 비수기 15~20만원대도 가능."], ["성수기 시기", "① 건기(3~9월): 다낭 최고 맑음, 해변 성수기. 특히 6~8월 한국 여름 휴가와 겹쳐 폭발. ② 연말연시(12~1월): 의외로 한국 여행자 꾸준. ③ 비수기에도 꾸준한 수요로 성수기 가격 차이 크지 않음."], ["비수기", "우기(10~12월): 중부 베트남 홍수·침수 가능. 호이안 침수 위험. 가격 저렴."], ["예약 추천 시기", "여름 성수기: 2~3개월 전. 비수기: 2~4주 전도 가능."]], "음식숙소주의": [["특산음식", "미꽝(강황 면+새우+고기+채소, 다낭 대표 음식) / 반미(베트남 바게트 샌드위치) / 분짜까(다낭 스타일 짜까 볶음 쌀국수) / 반코아이(참깨 과자) / 호이안 까오러우(호이안 연계)."], ["숙소 분포", "미케비치 주변: 해변 근접 리조트·호텔 밀집(빈펄·풀만·노보텔). 다낭 시내: 저렴한 비즈니스호텔. 호이안: 30km 떨어진 곳에 별도 리조트. 해변 리조트 1박 2,000,000~8,000,000동."], ["주의사항", "① 10~12월 우기: 홍수 가능성 — 방수 신발 지참, 호이안 침수 확인 필수. ② 바나힐 케이블카 이른 아침 운행 시작 — 날씨 맑은 날 오전 방문 필수. ③ 그랩 앱 사용 필수 — 미터기 없는 택시 바가지 주의."]], "연계": [["여행 패턴", "다낭 단독(3~4박) or 다낭+호이안 연계(4~6박) 압도적."], ["주요 연계 도시", "① 호이안: 차량 30~45분, 당일 or 1박. 올드타운+등불 필수. ② 후에: 차량 2.5시간, 왕궁·왕릉 역사 도시. ③ 하노이: 국내선 1시간. ④ 호치민: 국내선 1시간 20분."], ["추천 조합", "3박4일: 다낭 단독 / 5박6일: 다낭3+호이안2 / 7박8일: 다낭+호이안+후에."]]}, "호이안": {"항공권": [["왕복 평균가격", "호이안 공항 없음. 다낭 공항 이용. 다낭 항공권 동일: 비수기 25~50만원 / 성수기 55~110만원."], ["성수기 시기", "다낭과 동일. 등불 축제(매월 보름, 특히 1·4·8·10월)가 목적이면 음력 보름 날짜 맞춰 방문."], ["비수기", "우기(10~12월): 투본강 홍수로 올드타운 일부 침수 가능. 특히 10~11월."], ["예약 추천 시기", "다낭 기준 동일."]], "음식숙소주의": [["특산음식", "까오러우(호이안 특산 두꺼운 면+돼지고기, 독우물 물로만 만든다는 전설) / 화이트 로즈(흰 장미 모양 새우만두) / 꼼가(닭고기 덮밥, 호이안 스타일) / 바인 미(반미, 호이안식이 원조에 가까움)."], ["숙소 분포", "올드타운 내: 부티크 호텔·게스트하우스, 걸어서 명소 이동. 안방·끄아다이 해변: 해변 리조트(Four Seasons·Four Seasons). 올드타운 숙박 가격대: 500,000~3,000,000동."], ["주의사항", "① 올드타운 입장권(120,000동) 필수 — 무임승차 단속 강화. ② 자전거·오토바이 교통 복잡 — 좁은 골목 보행 주의. ③ 맞춤 의류 완성도 체크 필수 — 24시간 내 수령, 문제 발생 시 시간 부족."]], "연계": [["여행 패턴", "다낭 거점 호이안 당일치기 or 1박이 압도적으로 많음."], ["주요 연계 도시", "① 다낭: 차량 30~45분. ② 후에: 차량 2.5시간, 역사 도시. ③ 미선(참파 유적): 차량 약 1시간, 유네스코."], ["추천 조합", "다낭 거점 당일치기 / 다낭3+호이안2 / 호이안 단독 2박."]]}, "하노이·하롱베이": {"항공권": [["왕복 평균가격", "비수기: 25~55만원 / 성수기: 60~110만원. 인천↔하노이(HAN) 직항."], ["성수기 시기", "① 봄(3~4월): 맑고 온화. ② 가을(10~11월): 하롱베이 맑음+선선. ③ 설날(구정) 전후: 베트남 내부 이동 폭증. 구정 기간 식당 휴업 많음."], ["비수기", "여름(6~8월): 무덥고 습함. 겨울(12~2월): 흐리고 쌀쌀. 이 시기 저렴."], ["예약 추천 시기", "봄·가을 성수기: 2~3개월 전. 하롱베이 크루즈: 성수기 3개월 전."]], "음식숙소주의": [["특산음식", "쌀국수(포, 하노이 스타일: 맑은 육수+얇은 면) / 분짜(구운 돼지고기+쌀국수 냉면, 오바마가 먹어 유명) / 에그 커피(달걀 노른자+커피, 하노이 발명) / 반꾸온(쌀피 롤) / 하노이 비어(비아하노이·333)."], ["숙소 분포", "구시가(호안끼엠 호수 주변): 게스트하우스~부티크 호텔, 관광 최적. 호안끼엠 서쪽: 중급 비즈니스호텔. 바딘·떠이호: 고급 호텔(하노이 소피텔·힐튼). 1박 1,000,000~4,000,000동."], ["주의사항", "① 구시가 오토바이 물결 — 길 건널 때 멈추지 말고 일정 속도로 직진. ② 에그 커피: 식으면 맛 급감, 뜨거울 때 마시기. ③ 하롱베이 크루즈 등급 차이 크므로 리뷰 꼼꼼히 확인. ④ 하노이 겨울(12~2월): 흐리고 스모그 심할 수 있음."]], "연계": [["여행 패턴", "하노이+하롱베이 크루즈 패키지가 압도적. 하롱베이 1박 크루즈 강력 권장."], ["주요 연계 도시", "① 하롱베이: 버스 3.5시간. ② 닌빈(육지의 하롱): 버스 2시간, 짱안 보트 투어. ③ 사파: 야간열차 8시간, 소수민족+계단식 논. ④ 다낭: 국내선 1시간."], ["추천 조합", "3박4일: 하노이2+하롱베이1박 / 5박6일: 하노이2+하롱베이1박+닌빈1 / 7박8일: 하노이+하롱베이+사파."]]}, "호치민": {"항공권": [["왕복 평균가격", "비수기: 25~55만원 / 성수기: 60~110만원. 인천↔호치민(SGN) 직항."], ["성수기 시기", "① 건기(12~4월): 맑고 쾌청, 관광 최적. ② 연말연시·설날(구정): 수요 폭증, 식당·상점 휴업 주의. ③ 뚜렷한 단일 성수기 없이 비교적 연중 고른 수요."], ["비수기", "우기(5~11월): 오후 스콜 1~2시간. 여행 가능하나 저렴."], ["예약 추천 시기", "건기 성수기: 2~3개월 전. 비수기: 2~4주 전도 가능."]], "음식숙소주의": [["특산음식", "쌀국수(포, 남부 스타일: 숙주+바질+진한 육수) / 반미(바게트 샌드위치, 호치민이 원조) / 분보남보(남부 소고기 쌀국수) / 까오러우(호치민에서도 판매) / 생과일주스(열대과일 풍부)."], ["숙소 분포", "1군(지구): 도심 중심, 노트르담+벤탄 근접, 중~고급 호텔. 3군: 로컬 분위기, 저렴한 게스트하우스. 7군 푸미흥: 한인타운, 장기 체류자. 루프탑바 딸린 중급 호텔 인기."], ["주의사항", "① 핸드폰·가방 오토바이 날치기 빈번 — 길거리 핸드폰 사용 자제. ② 벤탄 시장 주변 바가지 극심 — 흥정은 필수, 표시가 두 배 이상. ③ 구정(음력 설) 기간 대부분 식당 휴업 — 일정 주의."]], "연계": [["여행 패턴", "호치민 단독(3~4박) or 호치민+메콩델타+무이네 연계."], ["주요 연계 도시", "① 메콩델타: 버스 2~3시간, 수상시장 당일 투어. ② 무이네: 버스 4~5시간, 사막+서핑. ③ 달랏: 버스 7시간 or 비행기 45분, 고원 휴양지. ④ 하노이: 국내선 2시간."], ["추천 조합", "3박4일: 호치민 단독 / 5박6일: 호치민3+메콩1+무이네1 / 7박8일: 호치민+달랏+나트랑."]]}, "나트랑": {"항공권": [["왕복 평균가격", "비수기: 30~60만원 / 성수기: 65~120만원. 인천↔나트랑 캄란 공항(CXR) 직항."], ["성수기 시기", "① 건기(1~8월): 맑고 바다 최상. 특히 4~8월 한국 수요 집중. ② 연말연시. 나트랑은 건기가 길어 비교적 고른 수요."], ["비수기", "우기(9~12월): 파도 높고 흐림. 투어 결항 가능."], ["예약 추천 시기", "성수기: 2~3개월 전. 비수기: 2~4주 전."]], "음식숙소주의": [["특산음식", "분짜까(나트랑 특산 까 볶음 쌀국수) / 반칸(쌀+고기+허브 현지 음식) / 씨푸드(가재·새우·랍스터 직거래) / 요커트 아이스크림(컵에 담아 먹는 나트랑 특산)."], ["숙소 분포", "나트랑 비치 주변: 쉐라톤·인터콘티넨탈·빈펄 등 고급 리조트 밀집. 시내: 저렴한 게스트하우스·비즈니스호텔. 빈펄 리조트(섬): 케이블카로 이동, 리조트 내 워터파크 포함."], ["주의사항", "① 씨푸드 가격 흥정 필수 — 시장가 2~3배 요구 흔함. ② 해변 마사지: 위생 상태 확인. ③ 나트랑 비치 만조 시간 모래사장 좁아짐 — 조석 시간 확인."]], "연계": [["여행 패턴", "나트랑 단독(3~4박) or 호치민·달랏 연계."], ["주요 연계 도시", "① 달랏: 버스 3.5시간, 고원 휴양지+폭포. ② 호치민: 국내선 1시간 20분. ③ 무이네: 버스 약 5시간. ④ 하노이: 국내선 2시간."], ["추천 조합", "3박4일: 나트랑 단독 / 5박6일: 나트랑3+달랏2 / 호치민+나트랑 연계."]]}, "싱가포르": {"항공권": [["왕복 평균가격", "비수기: 50~90만원 / 성수기: 100~180만원. 인천↔싱가포르(SIN) 직항. 싱가포르항공·대한항공·제주항공 등."], ["성수기 시기", "① 연말연시·크리스마스(12월): 오차드 로드 일루미네이션+마리나베이 카운트다운 — 동남아 허브 최고 성수기. ② 싱가포르 F1 나이트 레이스(9월): 세계적 이벤트 기간 호텔 3~5배. ③ 이슬람 하리라야·중국 구정도 일부 영향."], ["비수기", "뚜렷한 비수기 없음. 열대성 기후로 연중 온난. 1~2월·6~7월 상대적으로 저렴."], ["예약 추천 시기", "연말연시·F1: 6개월 전. 일반: 1~2개월 전."]], "음식숙소주의": [["특산음식", "하이난 치킨라이스(국민 음식) / 칠리크랩·블랙페퍼크랩(명물 씨푸드, 1마리 80~150SGD) / 락사(코코넛 카레 국수) / 바쿠테(돼지갈비 허브탕) / 로티 프라타(인도식 팬케이크) / 차쿠에이(중국식 아침)."], ["숙소 분포", "마리나 베이: 고급(MBS·풀러턴·만다린 오리엔탈). 오차드 로드: 쇼핑+중급~고급. 차이나타운·리틀 인디아: 저렴한 게스트하우스. 부기스: 중급. 호텔 물가 비쌈 — 3성급도 250~500SGD/박."], ["주의사항", "① 껌 소지·판매 금지(2004년~, 처방전 있으면 예외). ② 지하철 음식·음료 반입 금지 — 벌금 SGD 500. ③ 공공장소 흡연 엄격 규제. ④ 물가 서울보다 높음 — 예산 과소 책정 주의."]], "연계": [["여행 패턴", "싱가포르 단독(2~3박)이 대부분. 말레이시아·인도네시아 연계도 가능."], ["주요 연계 도시", "① 쿠알라룸푸르(말레이시아): 버스 5시간 or 비행기 1시간. ② 바탐섬(인도네시아): 페리 1시간. ③ 빈탄섬: 페리 50분, 리조트."], ["추천 조합", "2박3일: 싱가포르 단독 / 5박6일: 싱가포르2+쿠알라룸푸르2+페낭1."]]}, "발리": {"항공권": [["왕복 평균가격", "비수기: 40~75만원 / 성수기: 80~150만원. 인천↔발리 응우라라이 공항(DPS) 직항."], ["성수기 시기", "① 건기(4~10월): 맑고 최적. 7~8월 성수기 최고조(유럽·호주 휴가 겹침). ② 크리스마스·연말(12월): 고급 빌라 조기 매진."], ["비수기", "우기(11~3월): 아침엔 맑고 오후 스콜. 여행 가능, 가격 저렴. 우붓은 연중 녹음 아름다움."], ["예약 추천 시기", "건기 성수기: 3~4개월 전. 고급 빌라: 6개월 전. 비수기: 1개월 전."]], "음식숙소주의": [["특산음식", "나시고렝(볶음밥, 인도네시아 국민 음식) / 미고렝(볶음면) / 사테(꼬치 구이) / 바비굴링(발리 전통 통돼지 구이, 특별한 날 음식) / 라왈(발리 전통 돼지 날고기 샐러드, 용감한 자만 도전) / 젝쿱이(우붓 카페 코코넛+바나나)."], ["숙소 분포", "꾸따·르기안: 저렴한 게스트하우스·파티 분위기. 스미냑: 세련된 부티크 호텔·빌라. 짱구: 힙한 디지털 노마드·서퍼 공간. 우붓: 자연 속 빌라·리트리트. 울루와투: 절벽뷰 인피니티 풀 고급 빌라."], ["주의사항", "① 가짜 경찰 사기 — '마약 검사' 명목 금품 요구. 진짜 경찰은 영장 없이 숙소 검색 불가. ② 환전: 공인 환전소(모노렉스·PT 센트라) 이용, 사설 환전소 매우 위험. ③ 힌두교 행렬·의식 촬영 및 방해 금지. ④ 넷야피(Nyepi, 침묵의 날): 연 1회 24시간 외출·불빛 금지, 공항도 폐쇄."]], "연계": [["여행 패턴", "발리 단독(5~7박)이 가장 많음. 지역 내 우붓+해변 이동이 기본."], ["주요 연계 도시", "① 롬복: 페리 4시간 or 비행기 30분, 기리 삼섬 스노클링. ② 코모도섬: 비행기 1시간, 코모도 드래곤+핑크 비치. ③ 자카르타: 비행기 1.5시간. ④ 싱가포르: 비행기 2.5시간."], ["추천 조합", "5박6일: 발리 단독(우붓2+해변3) / 7박8일: 발리5+롬복2 / 해변 리트리트 6~8박."]]}, "세부": {"항공권": [["왕복 평균가격", "비수기: 35~65만원 / 성수기: 70~130만원. 인천↔막탄세부 공항(CEB) 직항."], ["성수기 시기", "① 건기(11~5월): 다이빙·해양 스포츠 최적. 12~4월이 핵심 성수기. ② 크리스마스(12~1월): 필리핀 최대 명절 — 현지 인파+해외 여행자 겹침. ③ 시눌로그(Sinulog) 축제(1월 셋째 주): 세부 최대 종교 축제, 기간 중 호텔 폭등."], ["비수기", "우기(6~10월): 태풍 위험. 특히 7~9월."], ["예약 추천 시기", "건기 성수기·크리스마스: 3~4개월 전. 시눌로그 기간: 6개월 전."]], "음식숙소주의": [["특산음식", "레촌(세부 통돼지 구이, 필리핀 전국 1위 맛집으로 인정) / 시니강(새콤한 고기 수프) / 아도보(간장·식초 볶음 고기) / 할로할로(빙수+팥+타로 디저트) / 초리조(세부 소시지)."], ["숙소 분포", "막탄섬: 공항 근접, 샹그릴라·마리바고 블루워터 등 리조트 밀집. 세부 시티: 비즈니스호텔, 시내 관광 편리. IT 파크 주변: 중급 호텔, 레스토랑. 막탄섬 리조트 1박 5,000~20,000페소."], ["주의사항", "① 오슬롭 고래상어 투어: 새벽 3~4시 세부 출발 — 체력 소모 큼, 전날 충분한 휴식. ② 택시 미터기 사용 필수 — 그랩 앱 강력 권장. ③ 성탄 기간(12~1월) 시내 교통 마비 수준 — 여유 일정 필수."]], "연계": [["여행 패턴", "세부 단독(3~4박) or 세부+보홀 연계(5~7박) 가장 많음."], ["주요 연계 도시", "① 보홀: 고속선 2시간, 초콜릿힐+안경원숭이. ② 말라파스쿠아: 배 3시간, 고래상어 다이빙. ③ 팔라완: 국내선 1.5시간, 코론 침몰선. ④ 보라카이: 국내선 30분."], ["추천 조합", "3박4일: 세부 단독 / 5박6일: 세부3+보홀2 / 7박8일: 세부+보홀+팔라완."]]}, "쿠알라룸푸르": {"항공권": [["왕복 평균가격", "비수기: 30~60만원 / 성수기: 65~120만원. 인천↔쿠알라룸푸르(KUL) 직항. 에어아시아 저가항공 활발."], ["성수기 시기", "① 비교적 연중 고른 수요 — 열대성 기후로 계절 차이 적음. ② 연말연시·크리스마스: 쇼핑+이벤트 수요. ③ 이슬람 라마단 직후 하리라야(이드): 말레이 현지 이동 폭증."], ["비수기", "뚜렷한 비수기 없음. 4~5월·8~9월 상대적으로 한산."], ["예약 추천 시기", "성수기: 2~3개월 전. 일반: 1개월 전도 가능."]], "음식숙소주의": [["특산음식", "나시르막(코코넛 밥+멸치+오이+삶은달걀+삼발 소스, 말레이 국민 아침) / 반미(베트남 영향 샌드위치) / 치킨라이스(하이난식) / 로작(과일·야채 새우젓 샐러드) / 린치·두리안 등 열대과일."], ["숙소 분포", "KLCC(트윈타워 주변): 고급 호텔(만다린·샹그릴라). 부킷빈탕: 쇼핑+중급 호텔 밀집. 차이나타운: 저렴한 게스트하우스. 공항 KLIA 근처: 비즈니스 환승 호텔."], ["주의사항", "① 이슬람 국가 — 무슬림 사원 방문 복장(머리·어깨·다리 가리기), 기도 시간 방해 금지. ② 라마단 기간 공공장소 음식 자제. ③ 그랩 필수 — 미터기 없는 택시 바가지. ④ 두리안: 냄새 강해 호텔·교통수단 반입 금지."]], "연계": [["여행 패턴", "KL 단독(2~3박) or KL 거점으로 주변 연계."], ["주요 연계 도시", "① 말라카: 버스 2시간, 유네스코 포르투갈 역사 도시. ② 페낭: 버스 4시간 or 비행기 1시간, 미식 도시. ③ 랑카위: 비행기 1시간, 면세 섬. ④ 싱가포르: 버스 5시간 or 비행기 1시간."], ["추천 조합", "2박3일: KL 단독 / 5박6일: KL2+말라카1+페낭2 / 7박8일: KL+페낭+랑카위."]]}, "베이징": {"항공권": [["왕복 평균가격", "비수기: 20~50만원 / 성수기: 60~120만원. 인천↔베이징 수도 공항(PEK) or 다싱 공항(PKX) 직항. 중국 국내 항공사 가장 저렴."], ["성수기 시기", "① 국경절(10/1~7): 중국 최대 황금 연휴 — 만리장성 등 인파 극심. 가격 폭등. ② 춘절(구정): 베이징 현지인 귀성+관광객 겹침. ③ 봄(4~5월): 맑고 온화, 외국인 관광 성수기."], ["비수기", "겨울(12~2월): 영하 15°C 이하 혹한. 관광객 적고 가격 저렴. 스모그 심할 수 있음."], ["예약 추천 시기", "국경절·춘절: 3~6개월 전. 봄 성수기: 2~3개월 전."]], "음식숙소주의": [["특산음식", "베이징 오리(북경오리, 취안쥐더·다동 유명) / 자장면(炸酱面, 베이징 원조 짜장면) / 탕후루(설탕 코팅 딸기 꼬치) / 빙탕후루(산사나무 꼬치) / 궁바오치킨(궁보계정, 베이징식) / 위안샤오(구정 찹쌀경단)."], ["숙소 분포", "왕푸징·동청: 자금성 근접, 중~고급 호텔. 산리툰: 외국인 밀집, 나이트라이프, 부티크 호텔. 시성(왕권인근): 만리장성 접근 편리. 베이징 호텔 가성비 좋은 편, 비즈니스 400~1,500위안."], ["주의사항", "① VPN 필수 — 출발 전 설치(중국 내 다운로드 불가). ② 겨울 스모그: AQI 200 이상 시 마스크 필수. ③ 자금성 입장 사전 예약 필수(하루 입장 제한). ④ 위챗페이·알리페이 한국 카드 연동 필수 — 현금 사용 어려워짐. ⑤ 정치·역사 발언 주의."]], "연계": [["여행 패턴", "베이징 단독(3~4박) or 상하이 연계(총 7~9박)."], ["주요 연계 도시", "① 상하이: 고속열차 4.5시간 or 비행기 2.5시간. ② 시안: 고속열차 4.5시간, 병마용. ③ 청두: 비행기 2.5시간, 판다. ④ 하얼빈: 비행기 2시간, 겨울 빙설 축제(1~2월)."], ["추천 조합", "3박4일: 베이징 단독 / 7박8일: 베이징4+상하이3 / 베이징+시안 병마용 연계."]]}, "상하이": {"항공권": [["왕복 평균가격", "비수기: 20~50만원 / 성수기: 55~110만원. 인천↔상하이 푸동(PVG) or 홍차오(SHA) 직항."], ["성수기 시기", "① 봄(4~5월): 맑고 온화, 외국인 관광 성수기. ② 국경절(10/1~7): 황금연휴, 내국인 여행 폭증. ③ 춘절(구정): 귀성 인파."], ["비수기", "여름(7~8월): 무덥고 습함(35°C+). 겨울(12~2월): 흐리고 쌀쌀. 이 시기 저렴."], ["예약 추천 시기", "성수기: 2~3개월 전. 비수기: 1개월 전."]], "음식숙소주의": [["특산음식", "샤오룽바오(소룡포, 딩타이펑·남상만두 등) / 허가니 상하이 대게(9~12월 시즌) / 생전병(生煎, 군만두) / 홍샤오러우(홍소육, 돼지 삼겹 조림) / 양청후 대게(阳澄湖 大闸蟹, 상하이 최고급)."], ["숙소 분포", "푸동 루자쭈이: 고층 야경, 고급 호텔. 푸시 와이탄: 역사적 건물, 중~고급 호텔. 시내(황푸·징안): 중급 비즈니스호텔. 홍차오: 공항+전시장 근접. 비즈니스 400~1,500위안."], ["주의사항", "① VPN 필수. ② 여름 폭염 35~38°C — 야외 활동 최소화, 이른 아침 or 저녁 추천. ③ 지하철 피크시간 매우 혼잡. ④ 샤오룽바오 식을 새 없이 빨리 먹기 — 국물 화상 주의."]], "연계": [["여행 패턴", "상하이 단독(3~4박) or 베이징 연계(총 7~9박). 쑤저우·항저우 당일치기도 인기."], ["주요 연계 도시", "① 쑤저우: 고속열차 30분, 전통 정원+수향 마을. ② 항저우: 고속열차 1시간, 서호. ③ 베이징: 고속열차 4.5시간. ④ 우전·시탕: 버스 2~3시간, 강남 수향 마을."], ["추천 조합", "3박4일: 상하이 단독 / 5박6일: 상하이3+쑤저우1+항저우1 / 7박8일: 베이징4+상하이3."]]}, "두바이": {"항공권": [["왕복 평균가격", "비수기: 60~100만원 / 성수기: 100~180만원. 인천↔두바이(DXB) 직항. 에미레이트·대한항공 등."], ["성수기 시기", "① 겨울 여행 시즌(10~4월): 기후 쾌적(20~30°C), 전 세계 관광객 집중. 특히 12~2월. ② 엑스포·GITEX 등 국제 행사 기간: 호텔 2~5배 폭등. ③ 크리스마스·연말: 최고 성수기."], ["비수기", "여름(6~9월): 45~50°C 폭서 — 야외 불가. 호텔 가격 40~60% 급락. 쇼핑몰 위주 여행이면 오히려 저렴."], ["예약 추천 시기", "겨울 성수기: 3~4개월 전. 여름(비수기): 1개월 전도 가능."]], "음식숙소주의": [["특산음식", "샤와르마(아랍식 케밥 랩) / 후무스(병아리콩 딥) / 마크루바(쌀+채소+고기 솥밥) / 루갈마트(대추야자 찹쌀 케이크) / 아라비안 커피(카르다몸 향) / 에미레이트 날짜 과자(대추야자)."], ["숙소 분포", "더 스트립(SZR): 럭셔리 호텔(부르즈 알 아랍·아틀란티스·아르마니). JBR·마리나: 해변+중~고급. 데이라: 전통 시장 근처 저렴. 두바이 다운타운: 부르즈 할리파 근접 고급. 5성 호텔 1박 500~2,000AED+."], ["주의사항", "① 라마단 기간(2026년 약 2~3월): 낮 공공장소 음식·음료 금지, 드레스 코드 강화. ② 공공장소 음주 금지(바·호텔 내부만 허용). ③ 여름(6~9월) 폭서: 야외 관광 불가 수준. ④ 마약 소지 엄벌(한국에서 합법적으로 처방받은 일부 약물도 금지 — 의사 처방전 영어 번역 지참)."]], "연계": [["여행 패턴", "두바이 단독(3~4박) or 아부다비 연계. 유럽 경유지로도 활용."], ["주요 연계 도시", "① 아부다비: 버스 2시간, 루브르 아부다비+셰이크 자이드 모스크. ② 오만 무스캇: 비행기 1.5시간, 중동 숨은 보석. ③ 요르단 암만: 비행기 2시간. ④ 몰디브: 비행기 3시간, 허니문 연계."], ["추천 조합", "3박4일: 두바이 단독 / 5박6일: 두바이4+아부다비1 / 유럽 경유 두바이 스톱오버."]]}, "파리": {"항공권": [["왕복 평균가격", "비수기: 90~150만원 / 성수기: 160~300만원+. 인천↔파리 샤를드골(CDG) 직항(대한항공·에어프랑스 등). 경유 시 100~180만원(약 15시간+)."], ["성수기 시기", "① 여름(6~8월): 유럽 전체 최고 성수기. 에펠탑 입장 2~3시간 대기. 숙박 2~3배. ② 크리스마스·연말(12월): 샹젤리제 마켓+파리 일루미네이션. ③ 패션위크(1·3·6·10월): 호텔 요금 폭등."], ["비수기", "1~2월·11월: 인파 적고 저렴. 흐리고 비 많음. 뮤지엄 쾌적하게 관람 가능."], ["예약 추천 시기", "여름 성수기: 4~6개월 전. 연말·패션위크: 6개월 전. 비수기: 2~3개월 전."]], "음식숙소주의": [["특산음식", "크루아상(아침 필수, 동네 불랑제리) / 에스카르고(달팽이 요리, 전통 비스트로) / 뵈프 부르기뇽(소고기 와인 조림) / 오 그라탱(어니언 수프) / 마카롱(라뒤레·피에르 에르메) / 크레프(갈레트) / 자크(굴), 파리 브레스트(슈크림 빵)."], ["숙소 분포", "마레·샤틀레: 구시가 중심, 중~고급 부티크 호텔. 오페라·그랑 블루바르: 백화점 근접, 중급. 몽마르트: 전통 분위기, 저렴. 생제르맹: 지식인 감성, 비쌈. 3성급 1박 €120~250 / 4성급 €250~500."], ["주의사항", "① 소매치기 유럽 최악 도시 — 에펠탑·루브르 입구·지하철 1·4·6호선 특히 주의. 서명 요구 사기(브레이슬릿 강매)도 빈번. ② 에펠탑·루브르·베르사유 반드시 사전 예약(현장 구매 수 시간 대기). ③ 프랑스 파업(그레브): 불시 대중교통 파업 빈번 — 플랜B 필수. ④ 파리 물 비쌈 — 레스토랑 주문 시 '꺄라프 도(carafe d'eau)' 요청하면 무료 수돗물 제공."]], "연계": [["여행 패턴", "파리 단독(4~5박) or 파리+다른 유럽 도시 연계. 유럽 여행 출발지로 활용."], ["주요 연계 도시", "① 베르사유: RER C 40분, 당일치기. ② 런던: 유로스타 2시간 15분, 파리↔런던 가장 인기. ③ 암스테르담: 탈리스 3.5시간. ④ 바르셀로나: TGV 6.5시간 or 비행기 2시간. ⑤ 스위스 제네바·인터라켄: TGV 3~4시간."], ["추천 조합", "4박5일: 파리 단독 / 7박8일: 파리4+런던3 or 파리4+암스테르담2+브뤼셀1 / 파리↔런던 유로스타 조합."]]}, "런던": {"항공권": [["왕복 평균가격", "비수기: 100~160만원 / 성수기: 170~320만원+. 인천↔런던 히스로(LHR) 직항(대한항공·아시아나·영국항공). 개트윅 경유 저렴하나 시내 접근 멀음."], ["성수기 시기", "① 여름(6~8월): 날씨 가장 좋음, 인파·가격 최고. ② 크리스마스·연말(12월): 하이드파크 윈터원더랜드+크리스마스 마켓. ③ 테니스 윔블던(6~7월)·첼시 플라워쇼(5월): 기간 중 호텔 2~3배."], ["비수기", "1~3월·11월: 날씨 흐리고 비. 가장 저렴. 박물관 쾌적."], ["예약 추천 시기", "여름·크리스마스: 4~6개월 전. 비수기: 2~3개월 전."]], "음식숙소주의": [["특산음식", "피시앤칩스(영국 국민 음식, 신문지에 싸서) / 풀 잉글리시 브렉퍼스트(달걀·베이컨·소시지·베이크드빈) / 선데이 로스트(일요일 전통 구운 고기+감자) / 버터 치킨·카레(영국 국민 음식 2위, 인도 이민자 영향) / 스콘+클로티드 크림(애프터눈 티)."], ["숙소 분포", "코벤트가든·사우스뱅크: 관광 중심, 중~고급. 쇼디치: 힙한 이스트 런던, 중급. 패딩턴: 히스로 익스프레스 연결, 비즈니스호텔. 해로즈 근처 나이츠브릿지: 최고급. 3성급 1박 £120~200 / 4성급 £200~400."], ["주의사항", "① eTA 사전 신청 필수(£10) — 솅겐과 별개, 영국만 별도. ② 런던 물가 유럽 최고 — 커피 £5~7, 펍 맥주 £6~8, 외식 £20~40. ③ 우측 통행(에스컬레이터 오른쪽 서기). ④ 컨택트리스 카드 결제 보편화 — 현금 거의 불필요. ⑤ 팁 문화: 레스토랑 서비스 차지 12.5% 자동 청구 확인."]], "연계": [["여행 패턴", "런던 단독(4~5박) or 파리 유로스타 연계 가장 많음."], ["주요 연계 도시", "① 파리: 유로스타 2시간 15분, 가장 인기 연계. ② 에든버러: 기차 4.5시간, 스코틀랜드 수도. ③ 바스: 기차 1.5시간, 로마 목욕탕 유적. ④ 스톤헨지: 버스 투어 2시간. ⑤ 옥스퍼드·케임브리지: 버스 1.5~2시간."], ["추천 조합", "4박5일: 런던 단독 / 7박8일: 런던4+파리3 / 런던+에든버러 영국 일주."]]}, "로마": {"항공권": [["왕복 평균가격", "비수기: 85~140만원 / 성수기: 150~280만원+. 인천↔로마 피우미치노(FCO) 직항(아시아나·이탈리아항공 등) or 경유."], ["성수기 시기", "① 여름(6~8월): 관광 최성수기. 콜로세움 줄 2~3시간. 35~40°C 폭서. ② 크리스마스·연말: 바티칸 특별 미사. ③ 이스터(부활절, 3~4월): 바티칸 광장 대규모 미사, 기간 중 호텔 급등."], ["비수기", "1~2월·11월: 인파 가장 적음. 날씨 15~18°C 쾌적. 박물관 쾌적 관람."], ["예약 추천 시기", "여름·이스터: 4~6개월 전. 특히 콜로세움·바티칸 티켓 3개월 전 예약."]], "음식숙소주의": [["특산음식", "카르보나라(달걀+판체타, 로마 원조), 카초에페페(치즈+후추), 아마트리치아나(토마토+판체타), 젤라토(이탈리아 아이스크림, 집 카르파첼리·팔라리노), 수플리(토마토 쌀 크로켓, 길거리 음식), 로마 피자(얇고 바삭)."], ["숙소 분포", "테르미니역 주변: 저렴한 비즈니스호텔·게스트하우스, 지하철 편리. 콜로세움 근처: 중급 호텔. 트레비 근처·스페인 광장: 중~고급, 위치 최고. 3성급 1박 €100~200."], ["주의사항", "① 콜로세움·바티칸 성수기 현장 구매 불가 수준 — 최소 1~3개월 전 온라인 예약 필수. ② 소매치기: 콜로세움·트레비·테르미니역 집중 주의. ③ 가짜 경찰(폴리치아): 여권 검사 요구하며 금품 갈취 — 실제 경찰은 길거리 무작위 검사 안 함. ④ 카르보나라 크림 절대 금지 — 로마 원조에 크림 없음, 식당 선택 시 확인."]], "연계": [["여행 패턴", "로마 단독(3~4박) or 이탈리아 일주(로마+피렌체+베네치아, 7~10박)."], ["주요 연계 도시", "① 나폴리: 기차 1.2시간, 피자 원조+폼페이. ② 피렌체: 기차 1.5시간, 르네상스 미술. ③ 베네치아: 기차 3.5시간, 운하 도시. ④ 아말피 해안: 나폴리 경유 버스+페리."], ["추천 조합", "3박4일: 로마 단독 / 7박8일: 로마3+피렌체2+베네치아2 / 10박: 이탈리아 남부+중부+북부."]]}, "바르셀로나": {"항공권": [["왕복 평균가격", "비수기: 90~150만원 / 성수기: 160~300만원+. 인천↔바르셀로나(BCN) 직항(대한항공 등) or 경유."], ["성수기 시기", "① 여름(6~8월): 해변+건축 관광 최고 성수기. 35°C+ 폭서. 에어컨 없는 숙박 많음. ② 라 메르세 축제(9월): 바르셀로나 최대 축제. ③ 크리스마스·연말. 7~8월 소매치기 사고 연간 최다."], ["비수기", "1~2월: 인파 없고 쾌적. 15~18°C. 가격 저렴."], ["예약 추천 시기", "여름: 4~6개월 전. 사그라다 파밀리아 티켓: 2~3개월 전 필수."]], "음식숙소주의": [["특산음식", "파에야(해산물 밥, 발렌시아 원조지만 바르셀로나에서도 인기) / 판 콘 토마테(토마토 마늘 빵, 카탈루냐 아침 기본) / 크로케타스(크림 크로켓) / 하몬(이베리코 돼지 햄) / 카탈루냐 크렘(크렘 브뤼레 원조) / 보케리아 시장 생과일주스."], ["숙소 분포", "고딕 지구: 관광 최적, 저~중급. 그라시아 대로: 가우디 건물 근접, 중~고급. 바르세로네타(해변): 여름 해변 분위기. 에이샴플라: 모던하고 중급. 3성급 1박 €100~200."], ["주의사항", "① 소매치기 유럽 1위 — 람블라스·지하철 L1·L2 극주의. 배낭은 앞으로, 테이블 위 소지품 방치 금지. ② 파업(Vaga): 카탈루냐 독립 운동 관련 시위·파업 예고 없이 발생. ③ 사그라다 파밀리아 현장 구매 거의 불가 — 반드시 온라인 예약. ④ 카탈루냐어와 스페인어 혼용 — 지역 정서상 카탈루냐어 먼저."]], "연계": [["여행 패턴", "바르셀로나 단독(4~5박) or 스페인·포르투갈 연계."], ["주요 연계 도시", "① 마드리드: 고속열차 AVE 2.5시간, 프라도 미술관. ② 그라나다: 버스 5시간 or 비행기 1.5시간, 알함브라 궁전. ③ 발렌시아: 고속열차 1.5시간, 파에야 원조. ④ 리스본: 비행기 2시간."], ["추천 조합", "4박5일: 바르셀로나 단독 / 7박8일: 바르셀로나4+마드리드2+그라나다1 / 이베리아 반도 일주."]]}, "프라하": {"항공권": [["왕복 평균가격", "비수기: 80~130만원 / 성수기: 140~250만원. 인천→프랑크푸르트·빈·암스테르담 경유→프라하(PRG). 직항 없음."], ["성수기 시기", "① 여름(6~9월): 맑고 관광 최적. 7~8월 최고 성수기. ② 크리스마스 마켓(12월): 구시가 광장 마켓 — 유럽 3대 크리스마스 마켓으로 손꼽힘. 기간 중 유럽 전역에서 몰려옴."], ["비수기", "1~3월·11월: 추위지만 인파 없고 저렴. 크리스마스 직전까지 비수기."], ["예약 추천 시기", "여름: 3~4개월 전. 크리스마스 마켓: 4~6개월 전."]], "음식숙소주의": [["특산음식", "스비치코바(소고기 크림 소스+크네들리크 빵 덩어리) / 굴라시(헝가리 영향 쇠고기 스튜) / 슈페크나보르(훈제 베이컨) / 트루들로(계피설탕 원통 빵, 관광용이나 맛있음) / 체코 맥주(필스너 우르켈·버드바·코젤, 1리터 €2~4)."], ["숙소 분포", "구시가(말라스트라나·구시가): 관광 최적, 부티크 호텔~중급. 비노흐라디: 조용하고 저렴, 지하철 편리. 쥐쥐코프: 로컬 분위기. 3성급 1박 €80~150."], ["주의사항", "① 택시 미터기 바가지 — 우버·볼트 앱 사용 필수. ② 트루들로: 관광용 음식, 현지인은 잘 안 먹음. ③ 프라하성~카를교 내리막 자갈길 — 굽 높은 신발 금물. ④ 환전: 유로화 환전 후 현지에서 코루나(CZK) 환전이 유리."]], "연계": [["여행 패턴", "프라하 단독(2~3박) or 동유럽 3국(프라하+빈+부다페스트) 황금 루트."], ["주요 연계 도시", "① 빈: 기차 4시간 or 버스 4.5시간. ② 부다페스트: 버스 6시간 or 기차 7시간. ③ 드레스덴: 기차 2시간, 바로크 도시. ④ 체스키크룸로프: 버스 3시간, 중세 소도시."], ["추천 조합", "2박3일: 프라하 단독 / 7박8일: 프라하2+빈2+부다페스트3 / 동유럽 10박 대장정."]]}, "스위스": {"항공권": [["왕복 평균가격", "비수기: 120~200만원 / 성수기: 200~380만원+. 인천↔취리히(ZRH) 직항(스위스항공·대한항공 등). 경유 시 약 100~170만원."], ["성수기 시기", "① 여름(6~9월): 하이킹·알프스 등산 최적. 7~8월 성수기 최고. ② 크리스마스·연말: 유럽 최고 스위스 스키+온천 패키지. ③ 스키 시즌(12~3월): 닛세코·다보스 등 스키 리조트 성수기."], ["비수기", "4~5월·10~11월: 봄·가을 어깨 시즌. 융프라우 일부 시설 공사 가능."], ["예약 추천 시기", "여름 성수기: 4~6개월 전. 스키 시즌: 6개월 전."]], "음식숙소주의": [["특산음식", "퐁뒤(치즈 퐁뒤 — 전통 겨울 음식) / 라클렛(녹인 치즈를 긁어 먹는 방식) / 로스티(감자 팬케이크) / 스위스 초콜릿(린트·토블러론·슈프른리) / 무에슬리(귀리 뮤즐리, 스위스 발명) / 제르벨라(소시지)."], ["숙소 분포", "취리히: 대도시, 비즈니스호텔~럭셔리. 인터라켄: 알프스 거점, 중급 호텔. 체르마트: 고급 산악 호텔·샬레. 루체른: 중급~고급. 스위스 숙박 유럽 최고가 — 3성급 CHF 150~250/박."], ["주의사항", "① 물가 유럽 최고 — 외식 CHF 25~50, 슈퍼마켓 쿱·미그로스 활용 필수. ② 융프라우 정상(3,454m): 고산증+영하 기온 — 경량 패딩·선글라스·선크림 필수. ③ 스위스 패스 없이 개별 교통비 엄청나게 비쌈 — 여러 도시 이동 시 패스 구매 필수. ④ 맑은 날이어야 융프라우 의미 있음 — 날씨 예보 확인 후 방문."]], "연계": [["여행 패턴", "스위스 단독(5~7박) or 유럽 여행 중 스위스 포함(3~4박)."], ["주요 연계 도시", "① 파리: TGV 3.5시간. ② 밀라노: 기차 3.5시간. ③ 뮌헨: 기차 3.5시간. ④ 잘츠부르크: 기차 3시간."], ["추천 조합", "5박6일: 스위스 단독(취리히+루체른+인터라켄+체르마트) / 유럽 일주 중 3박 포함 / 파리+스위스+이탈리아 루트."]]}, "포르투갈": {"항공권": [["왕복 평균가격", "비수기: 100~160만원 / 성수기: 170~300만원+. 인천↔리스본(LIS) 직항 없음. 파리·암스테르담·프랑크푸르트 경유 약 15시간."], ["성수기 시기", "① 여름(6~8월): 관광 최성수기. 35°C+ 폭서. 알가르브 해변 전 유럽 관광객 집중. ② 리스본 성 안토니우 축제(6월 13일): 수십만 명 거리 파티. ③ 서핑 시즌(10~3월): 나자레 등 거대 파도 세계적 명성."], ["비수기", "1~3월·11월: 비 잦음. 가격 저렴. 튤립·꽃 없음."], ["예약 추천 시기", "여름: 4~6개월 전. 비수기: 2~3개월 전."]], "음식숙소주의": [["특산음식", "파스텔 드 나타(에그 타르트, 벨렘 원조 파스테이스 드 벨렘에서 꼭 먹기) / 바칼랴우(대구 건어물, 포르투갈 국민 음식, 조리법 1,000가지) / 아소르다(빵+마늘+달걀 수프) / 포르투 와인(달콤한 주정강화 와인) / 갈랑이냐(닭고기 튀김, 리스본 가정식)."], ["숙소 분포", "리스본 바이샤·알파마: 관광 중심, 소규모 부티크 호텔. 벨렘: 리조트형 호텔. 포르투 리베이라(강변): 중~고급, 조망 좋음. 3성급 1박 €80~150."], ["주의사항", "① 소매치기: 트램 28·알파마·리스본 지하철 집중 주의. ② 리스본 언덕 자갈길 — 굽 높은 신발 금물, 미끄러움. ③ 파두 공연 레스토랑: 음식 주문 필수, 단순 관람만은 불가. ④ 신트라 이동: 주말 기차 매우 혼잡 — 이른 아침 출발 권장."]], "연계": [["여행 패턴", "리스본+포르투 연계(5~7박)가 가장 많음. 스페인과 연계하는 이베리아 반도 여행도 인기."], ["주요 연계 도시", "① 포르투↔리스본: 기차 약 3시간. ② 신트라: 리스본에서 기차 40분. ③ 마드리드(스페인): 기차 약 10시간 or 비행기 1.5시간. ④ 세비야: 기차 or 비행기 1시간."], ["추천 조합", "5박6일: 리스본3+포르투2 / 7박8일: 리스본3+신트라+포르투2+알가르브1 / 이베리아 반도 10박."]]}, "크로아티아": {"항공권": [["왕복 평균가격", "비수기: 100~170만원 / 성수기: 180~320만원+. 인천↔두브로브니크(DBV) or 자그레브(ZAG) 직항 없음. 프랑크푸르트·이스탄불·비엔나 경유."], ["성수기 시기", "① 여름(7~8월): 극성수기. 두브로브니크 성벽 1일 방문객 2만~3만 명. 숙박 3~5배 폭등. 열기 38°C+. ② 6월·9월: 성수기이나 7~8월보다 쾌적, 인파 적음. ③ 두브로브니크 서머 페스티벌(7~8월): 기간 중 공연."], ["비수기", "10월~5월: 인파 없고 저렴. 10월·5월은 날씨도 좋아 강력 추천."], ["예약 추천 시기", "7~8월: 6개월~1년 전. 5~6월·9~10월: 3~4개월 전."]], "음식숙소주의": [["특산음식", "흑 트러플(이스트라 반도 특산, 트러플 파스타·치즈) / 달마티아 프로슈토(달마시안 훈제 햄) / 파스티차다(달마티아 소고기 스튜) / 브로데트(생선 스튜, 달마티아 해안) / 크로아티아 와인(흐르바츠코 포도주, 프로섹 달콤한 와인) / 후불레탁(개구리 뒷다리 튀김, 자그레브 특산)."], ["숙소 분포", "두브로브니크 구시가: 성벽 내 소수 고급 숙소, 극고가. 필라 지구: 성 외곽, 중급. 라파드: 해변+버스 접근. 스플리트: 두브로브니크보다 30~50% 저렴. 7~8월 두브로브니크 중급 1박 €200~500."], ["주의사항", "① 두브로브니크 7~8월: 성벽 관람 오전 8시 전 or 저녁 방문 권장(낮 38°C+, 인파 극심). ② 플리트비체 성수기 사전 예약 필수 — 성수기 조기 매진. ③ 구시가 자갈길: 굽 높은 신발, 무거운 캐리어 이동 매우 불편. ④ 크루즈 기항 시간(오전 10시~오후 6시) 두브로브니크 인파 최극심 — 이 시간 피하기."]], "연계": [["여행 패턴", "두브로브니크+스플리트 연계(4~6박) or 동유럽 패키지 포함."], ["주요 연계 도시", "① 스플리트↔두브로브니크: 페리 4~5시간 or 버스 4.5시간. ② 플리트비체: 자그레브에서 버스 2시간. ③ 슬로베니아 류블랴나: 버스 약 5시간. ④ 몬테네그로 코토르: 버스 2시간."], ["추천 조합", "5박6일: 두브로브니크2+스플리트2+플리트비체1 / 7박8일: 자그레브1+플리트비체+스플리트2+두브로브니크2 / 슬로베니아+크로아티아 발칸 루트."]]}, "뉴욕": {"항공권": [["왕복 평균가격", "비수기: 100~160만원 / 성수기: 180~320만원+. 인천↔뉴욕 JFK/뉴어크(EWR) 직항(대한항공·아시아나·유나이티드 등). 약 13~14시간."], ["성수기 시기", "① 여름(6~8월): 관광 최성수기. 야외 활동 최적. ② 추수감사절·크리스마스·연말(11~1월): 메이시스 퍼레이드·록펠러 센터 트리 — 뉴욕 최고 이벤트. 호텔 2~4배 폭등. ③ 새해 볼드롭(12/31): 전 세계 방송, 기간 수만 명 집결."], ["비수기", "1~3월: 한파(-10~-15°C). 관광객 적고 저렴. 4월: 봄 시작."], ["예약 추천 시기", "연말·추수감사절: 6개월 전. 여름: 4~6개월 전. 비수기: 2~3개월 전."]], "음식숙소주의": [["특산음식", "뉴욕 피자(얇고 큰 슬라이스, 접어서 먹기) / 뉴욕 베이글(H&H·에사베이글) / 딜리 샌드위치(카츠 델리카트슨 파스트라미) / 할랄 카트(길거리 치킨+밥) / 체즈케이크(주니어스 원조) / 버펄로 윙."], ["숙소 분포", "미드타운(타임스퀘어 주변): 관광 최적, 최고가. 어퍼웨스트사이드: 센트럴파크 근접, 중~고급. 첼시·미트패킹: 트렌디, 중급. 브루클린: 저렴, 감성적. 3성급 1박 $200~350 / 4성급 $350~600."], ["주의사항", "① 지하철 안전: 심야 독보 자제, 노숙자 많음. 여행용 보조 가방 잠금 필수. ② 팁 필수: 레스토랑 18~22%, 택시 15~20%, 호텔 포터 $2~5. ③ 연말 타임스퀘어 볼드롭: 오후 3~4시부터 자리 잡아야 최전방 가능, 화장실 없음 — 사전 준비. ④ 브로드웨이 TKTS: 당일 할인이나 인기 작품은 당일도 없을 수 있음."]], "연계": [["여행 패턴", "뉴욕 단독(4~5박) or 동부 도시 연계(워싱턴·보스턴·나이아가라)."], ["주요 연계 도시", "① 워싱턴 D.C.: 기차 3시간(Amtrak Acela). ② 보스턴: 기차 4시간. ③ 나이아가라 폭포: 기차 8시간 or 버스+렌터카. ④ 필라델피아: 기차 1시간."], ["추천 조합", "4박5일: 뉴욕 단독 / 7박8일: 뉴욕4+워싱턴2+보스턴1 / 미국 동부 10박 일주."]]}, "하와이": {"항공권": [["왕복 평균가격", "비수기: 80~130만원 / 성수기: 150~270만원+. 인천↔호놀룰루(HNL) 직항(대한항공·하와이안항공 등). 약 8~9시간."], ["성수기 시기", "① 여름(6~8월): 한국 여름 방학+미국 여름 성수기 겹침. 최고 성수기. ② 연말연시·크리스마스(12~1월): 미국 본토 방문객 폭증. ③ 봄방학(3월): 미국 칼리지 스프링 브레이크. 4~6월·9~11월이 가격+날씨 최적."], ["비수기", "4~6월·9~11월: 날씨 좋고 인파 적음. 가격 합리적. 허니문 추천."], ["예약 추천 시기", "여름·연말: 4~6개월 전. 비수기: 2~3개월 전."]], "음식숙소주의": [["특산음식", "포케(날 참치+밥+소스, 하와이 원조) / 말라사다(포르투갈 영향 설탕 도넛, 레너스 유명) / 카루아 피그(땅 화덕에 구운 돼지, 루아우 파티 음식) / 로코 모코(밥+햄버거+달걀+그레이비, 하와이 소울푸드) / 하와이안 피자(논쟁 있는 파인애플 피자)."], ["숙소 분포", "와이키키: 리조트·호텔 밀집, 관광 최적. 카알라와이·카이물라니: 와이키키 인근 저렴. 마우이 카아나팔리·와일레아: 고급 리조트. 빅아일랜드 코나·힐로: 중급. 와이키키 4성급 1박 $300~600."], ["주의사항", "① ESTA 필수(미국령) — 출발 전 반드시 신청. ② 할레아칼라 일출 사전 예약 필수($1~35) — 없으면 입장 불가. ③ 렌터카: 오아후 외 섬은 렌터카 없으면 이동 어려움. 예약 필수. ④ 해파리 주의: 보름 후 7~10일 와이키키 해변 해파리 출몰 — 해변 안내판 확인."]], "연계": [["여행 패턴", "오아후(와이키키) 단독(4~5박) or 오아후+마우이 연계(7~9박)."], ["주요 연계 도시", "① 마우이: 국내선 35분. 허니문 1위 섬. ② 빅아일랜드: 국내선 45분, 화산+코나 커피. ③ 카우아이: 국내선 35분, 나팔리 코스트. ④ 라나이: 국내선 25분, 럭셔리 리조트."], ["추천 조합", "4박5일: 오아후 단독 / 7박8일: 오아후4+마우이3 / 10박: 오아후+마우이+빅아일랜드."]]}, "라스베이거스": {"항공권": [["왕복 평균가격", "비수기: 100~160만원 / 성수기: 170~300만원+. 인천→LA or 샌프란시스코→라스베이거스(LAS) 국내선 환승. 직항 없음. 총 약 15시간."], ["성수기 시기", "① 봄(3~5월)·가을(9~11월): 기후 쾌적(25~30°C), 컨벤션·콘서트 시즌. 호텔 가격 중간. ② 연말연시: 카운트다운 파티 — 전 세계 방문자 호텔 폭등. ③ CES(1월)·라스베이거스 에이스(3월 등): 컨벤션 기간 호텔 3~5배."], ["비수기", "여름(7~8월): 45°C+ 폭서 — 야외 불가. 12월~1월 초: 연말 외 기간 저렴. 라스베이거스는 컨벤션 일정이 가격에 가장 큰 영향."], ["예약 추천 시기", "컨벤션 기간 확인 후 피하거나 6개월 전 예약. 일반 시즌: 1~2개월 전도 가능."]], "음식숙소주의": [["특산음식", "더 스트립 유명 셰프 레스토랑(고든 램지·조엘 로뷔숑 등 미슐랭 레스토랑 다수) / 라스베이거스 뷔페(벨라지오·윈·코스모폴리탄 — 세계 최고 뷔페 경험, $50~120+) / 인앤아웃 버거(서부 체인) / 브런치(스트립 카지노 주말 브런치 인기)."], ["숙소 분포", "더 스트립: 세계 최대 호텔들(벨라지오·MGM·시저스·위·베네시안). 다운타운 프리몬트: 저렴, 레트로 분위기. 스트립 호텔 평일 €100~300 / 주말·이벤트 $300~1,000+."], ["주의사항", "① 카지노 규칙: 21세 미만 카지노 입장 불가(배우자 동반도 불가). ② 더 스트립 도보: 거리 착시 — 건물 큼, 실제 걷는 거리 훨씬 멈. 우버/리프트 이용 추천. ③ 무료 알코올: 카지노 게임 중 음료 무료 제공 — 과음 주의. ④ 결혼 예배당: 즉흥 결혼 주의(법적 효력 있음)."]], "연계": [["여행 패턴", "라스베이거스 단독(3~4박) or LA+라스베이거스 서부 연계."], ["주요 연계 도시", "① LA: 렌터카 4시간 or 버스 4.5시간. ② 그랜드캐니언 서쪽: 렌터카 2.5시간. ③ 앤텔로프 캐년+홀슈밴드: 렌터카 4시간. ④ 세도나: 렌터카 4.5시간."], ["추천 조합", "3박4일: 라스베이거스 단독 / 7박8일: LA2+라스베이거스3+그랜드캐니언1 / 서부 렌터카 일주."]]}, "로스앤젤레스": {"항공권": [["왕복 평균가격", "비수기: 90~150만원 / 성수기: 160~300만원+. 인천↔LA(LAX) 직항(대한항공·아시아나·델타 등). 약 11시간."], ["성수기 시기", "① 여름(6~8월): 해변+테마파크 최성수기. ② 오스카 시즌(3월): 레드카펫 이벤트. ③ 코첼라 음악 페스티벌(4월): 팜스프링스 인근, 호텔 폭등. ④ 연말연시."], ["비수기", "1~2월·11월: 상대적으로 한산. 기온 15~22°C 쾌적."], ["예약 추천 시기", "여름: 4~6개월 전. 비수기: 2~3개월 전."]], "음식숙소주의": [["특산음식", "LA 갈비(Korea Town 원조, 세계로 퍼진 한식 BBQ) / 타코 트럭(LA 거리 음식 문화, 아사다·알 파스토르) / 인앤아웃 버거(더블더블 머스트) / 에비앤로스트비프 샌드위치(필리 스타일) / 딤섬(몬트레이 파크 중국계 최고 수준)."], ["숙소 분포", "할리우드: 관광 중심, 중급. 산타모니카: 해변 근접, 고급. 베벌리힐스: 최고급. 코리아타운: 한인 타운, 한식당 밀집. 다운타운 LA: 비즈니스 중급. 3성급 1박 $150~280."], ["주의사항", "① 렌터카 없으면 이동 사실상 불가 — 국제면허 필수. ② 주차: 시내 $20~50+/일, 발렛 파킹 팁 $3~5. ③ 노숙자: 다운타운·베니스 비치 일부 지역 야간 단독 행동 주의. ④ 지진 상비 지식: 'Drop, Cover, Hold' — 한국과 다른 준비."]], "연계": [["여행 패턴", "LA 단독(3~4박) or LA+라스베이거스+그랜드캐니언 서부 렌터카 여행."], ["주요 연계 도시", "① 라스베이거스: 렌터카 4시간. ② 샌프란시스코: 비행기 1.5시간 or 렌터카 6시간(PCH 해안 드라이브). ③ 팜스프링스: 렌터카 2시간, 사막 리조트. ④ 산타바바라: 렌터카 1.5시간."], ["추천 조합", "3박4일: LA 단독 / 7박8일: LA3+라스베이거스3+그랜드캐니언1 / 서부 렌터카 10박."]]}, "시드니": {"항공권": [["왕복 평균가격", "비수기: 90~150만원 / 성수기: 160~280만원+. 인천↔시드니(SYD) 직항(대한항공·콴타스 등). 약 11시간."], ["성수기 시기", "① 남반구 여름(12~2월): 해변·야외 액티비티 최성수기. 크리스마스·새해 시드니 불꽃놀이 세계적 명성. ② 9~11월(봄): 날씨 쾌적, 야생화. ③ 월드 프라이드(격년): 성수기 특수."], ["비수기", "남반구 겨울(6~8월): 시원하나 관광 가능. 가격 합리적."], ["예약 추천 시기", "크리스마스·새해: 6개월~1년 전. 여름 성수기: 4~6개월 전."]], "음식숙소주의": [["특산음식", "바라문디(농어 종류, 호주 대표 생선 구이) / 팀탐(초콜릿 비스킷, 호주 국민 과자) / 베지마이트(효모 발효 스프레드, 호불호 갈림) / 미트 파이(호주 국민 간식, 7-Eleven·베이커스 딜라이트) / 플랫화이트(호주·뉴질랜드 발명 커피, 시드니 카페 문화 세계 최고)."], ["숙소 분포", "CBD(서큘러키·달링하버): 오페라하우스 근접, 고급. 더 록스: 역사적, 고급. 본다이 비치: 서퍼+젊은층. 뉴타운·서리힐스: 로컬, 중급. 3성급 1박 AUD 150~280."], ["주의사항", "① eTA 미신청 시 탑승 거부 — 출발 전 공식 앱에서 반드시 신청. ② 자외선 차단 필수: 오존층 얇아 자외선 강도 한국의 3~4배 — SPF50+ 필수. ③ 젤리피시(해파리) 시즌: 여름 일부 해변 출몰 — 안내 표지 확인. ④ 야생동물: 캥거루 도로 야간 출몰 — 야간 운전 극히 주의."]], "연계": [["여행 패턴", "시드니 단독(4~5박) or 호주 동부 일주(시드니+멜버른+골드코스트)."], ["주요 연계 도시", "① 멜버른: 비행기 1.5시간 or 기차 11시간. ② 골드코스트: 비행기 1.5시간. ③ 캔버라: 버스 3.5시간, 호주 수도+전쟁기념관. ④ 뉴질랜드 오클랜드: 비행기 3시간."], ["추천 조합", "4박5일: 시드니 단독 / 7박8일: 시드니4+멜버른3 / 10박: 시드니+멜버른+골드코스트 동부 일주."]]}, "괌": {"항공권": [["왕복 평균가격", "비수기: 30~60만원 / 성수기: 65~130만원. 인천↔괌(GUM) 직항. 제주항공·진에어·티웨이 등 저가항공 경쟁 활발. 비수기 20만원대 특가도 자주 나옴."], ["성수기 시기", "① 건기(12~6월): 날씨 맑고 최적, 관광 성수기. 특히 1~3월 한국 겨울 방학+현지 쾌청 시즌. ② 여름 방학(7~8월): 가족 여행 수요 폭증 — 단, 우기 시즌과 겹침. ③ 연말연시: 크리스마스·새해 수요 상승."], ["비수기", "우기(7~11월): 스콜+태풍 가능. 가격 저렴. 여행 자체는 가능하나 투어 결항 위험."], ["예약 추천 시기", "성수기·방학: 2~3개월 전. 비수기: 2~4주 전도 가능."]], "음식숙소주의": [["특산음식", "차모로 음식(레드 라이스·피나데네 소스·에스카베체 생선 튀김) / 코코넛 크랩(세계 최대 게, 야행성 특산) / 케라구엔(레몬+코코넛+닭 요리) / 바베큐 리브·치킨(차모로 야시장 명물) / 라라다 도넛(현지 달달한 튀김 빵)."], ["숙소 분포", "투몬 비치: 하얏트·힐튼·쉐라톤·PIC 등 대형 리조트 밀집, 해변 직접 연결, 가장 인기. 타무닝: 투몬 남쪽, 비즈니스호텔·중급. 아가냐: 괌 수도, 저렴한 숙소. 리조트 1박 $150~400."], ["주의사항", "① ESTA 불필요(미국령 특별 프로그램) — 단, 여권 유효기간 6개월 이상 필수. ② 렌터카: 괌 북부·남부 관광 시 필요, 국제면허 지참. ③ 제트스키 사기: 사전 손상 바가지 요금 사기 흔함 — 탑승 전 차량 상태 사진 촬영 필수. ④ 쇼핑 면세 한도: 미국 내 기준 $800 초과 시 신고 필요."]], "연계": [["여행 패턴", "괌 단독(3~4박)이 압도적으로 많음. 사이판과 연계하는 경우도 있으나 드묾."], ["주요 연계 도시", "① 사이판: 유나이티드 항공 국내선 약 40분. ② 팔라우: 비행기 약 2시간, 세계 최고 다이빙 성지. ③ 도쿄·오사카: 비행기 3~3.5시간, 괌+일본 연계 패키지."], ["추천 조합", "3박4일: 괌 단독(가족·허니문) / 5박6일: 괌4+사이판1 / 괌+팔라우 다이빙 패키지."]]}, "사이판": {"항공권": [["왕복 평균가격", "비수기: 30~65만원 / 성수기: 70~140만원. 인천↔사이판(SPN) 직항. 제주항공·진에어 운항. 괌보다 노선 수 적음."], ["성수기 시기", "① 건기(12~6월): 괌과 동일. ② 여름 방학(7~8월): 가족 수요. ③ 연말연시. 괌보다 전체적으로 수요 적어 가격 편차 작음."], ["비수기", "우기(7~11월): 태풍 위험. 사이판 직격 태풍 빈번. 가격 저렴."], ["예약 추천 시기", "성수기: 2~3개월 전. 비수기: 1개월 전도 가능."]], "음식숙소주의": [["특산음식", "차모로 음식(괌과 동일 문화권) / 켈라구엔(코코넛+레몬 닭요리) / 래트남(타로 잎 코코넛 찜) / 바베큐 리브·해산물 / 현지 과일(파파야·코코넛·망고)."], ["숙소 분포", "마이크로 비치 주변(가라판): 중~고급 호텔 밀집, 관광 중심. 스우수페: 조용한 고급 리조트. 괌보다 전반적으로 저렴하고 한산함. 리조트 1박 $120~300."], ["주의사항", "① 괌보다 규모 작고 관광 인프라 적음 — 렌터카 없으면 이동 제한. ② 태풍 직격 위험 괌보다 높음 — 우기 여행보험 필수. ③ 2차대전 유적 곳곳 산재 — 인골·탄약 발견 가능, 함부로 만지지 않기."]], "연계": [["여행 패턴", "사이판 단독(3~4박)이 대부분. 괌보다 조용한 허니문·가족 선호."], ["주요 연계 도시", "① 괌: 국내선 약 40분. ② 로타섬: 소형기 약 20분, 세계 10대 다이빙 명소. ③ 티니안섬: 보트 10분, 원자폭탄 출격지 역사 유적."], ["추천 조합", "3박4일: 사이판 단독 / 5박6일: 사이판3+괌2 / 로타 다이빙 연계 1박."]]}, "멜버른": {"항공권": [["왕복 평균가격", "비수기: 90~150만원 / 성수기: 160~280만원+. 인천↔멜버른(MEL) 직항(대한항공·콴타스 등). 약 10시간."], ["성수기 시기", "① 남반구 여름(12~2월): 관광·해변 성수기. ② 호주 오픈(1월): 세계 4대 테니스 대회 — 기간 중 호텔 2~3배 폭등. ③ 멜버른 컵(11월): 경마 대회, 전국 공휴일. ④ F1 호주 그랑프리(3월): 성수기 특수."], ["비수기", "남반구 겨울(6~8월): 시원하나 10~15°C, 여행 가능. 가격 합리적."], ["예약 추천 시기", "호주 오픈·F1: 6개월 전. 여름: 4~5개월 전."]], "음식숙소주의": [["특산음식", "플랫화이트(멜버른·시드니가 세계 카페 문화 발상지) / 딤섬·얌차(차이나타운 박스힐 세계적 수준) / 소말리아·에티오피아 음식(이민자 문화) / 베지마이트(호주 국민 스프레드) / 그루퍼 피시(바라문디 생선 구이)."], ["숙소 분포", "CBD(시내): 교통 허브, 중~고급 체인 호텔. 사우스뱅크: 문화 시설+강변뷰, 중~고급. 피츠로이·콜링우드: 힙한 감성, 중급 에어비앤비. 세인트킬다: 해변 근접, 중급. 3성급 1박 AUD 150~250."], ["주의사항", "① eTA 미신청 시 탑승 거부 — 공식 앱 출발 전 필수 신청. ② 트램 무료 구간(Free Tram Zone, CBD 내): 이 구간 내 무임 탑승 가능, 그 밖은 Myki 카드 필요. ③ 멜버른 날씨: '하루 4계절' — 아침과 낮 기온 차 심함, 겉옷 필수. ④ 자외선 강도: SPF50+ 선크림 필수."]], "연계": [["여행 패턴", "멜버른 단독(4~5박) or 시드니+멜버른 호주 동부 연계."], ["주요 연계 도시", "① 시드니: 비행기 1.5시간. ② 애들레이드: 비행기 1시간, 와인 산지 바로사 밸리. ③ 그레이트 오션 로드: 렌터카 당일 투어. ④ 필립섬: 렌터카 1.5시간, 펭귄 퍼레이드."], ["추천 조합", "4박5일: 멜버른 단독 / 7박8일: 멜버른4+시드니3 / 10박: 멜버른+시드니+골드코스트 동부 일주."]]}, "골드코스트": {"항공권": [["왕복 평균가격", "비수기: 60~110만원 / 성수기: 110~200만원. 인천↔골드코스트(OOL) 직항(티웨이·진에어·에어아시아 등). 약 9.5시간. 한국 직항 노선 가장 저렴한 호주 목적지."], ["성수기 시기", "① 남반구 여름(12~2월): 해변 최성수기, 크리스마스·새해. ② 한국 여름 방학(7~8월): 한국 여행자 폭증 — 단, 남반구 겨울(선선함). ③ 어스 데이(4월): 호주 최대 서핑 대회 이벤트 기간."], ["비수기", "3~5월·9~11월: 날씨 좋고 인파 적음. 가격 합리적. 강력 추천 시즌."], ["예약 추천 시기", "크리스마스·한국 방학: 3~4개월 전. 비수기: 1~2개월 전."]], "음식숙소주의": [["특산음식", "씨푸드(황새치·바라문디·가재) / 서퍼스 파라다이스 카페 문화 / 팀탐(호주 과자) / 베지마이트 / 골드코스트 아이스크림·디저트(더운 날씨에 인기)."], ["숙소 분포", "서퍼스 파라다이스: 고층 아파트형 리조트·호텔 밀집, 가장 번화. 브로드비치: 카지노·쇼핑 근접, 중~고급. 쿨랑가타: 한적하고 저렴, 현지인 선호. 3성급 1박 AUD 120~220."], ["주의사항", "① eTA 필수 — 공식 앱 사전 신청. ② 제트스키·수상스포츠 안전 수칙 확인 — 호주 안전 기준 엄격. ③ 래밍턴 국립공원 진드기 주의 — 긴 소매·바지 착용 권장. ④ 공공장소 음주 일부 지역 금지 — 알코올 금지 구역 표지 확인."]], "연계": [["여행 패턴", "골드코스트 단독(4~5박) or 브리즈번+골드코스트 연계."], ["주요 연계 도시", "① 브리즈번: 기차 1시간, 호주 동부 거점. ② 시드니: 비행기 1.5시간. ③ 바이런 베이: 차량 1.5시간, 자연+서핑 소도시. ④ 론 파인 코알라(브리즈번): 차량 1시간, 코알라 안기."], ["추천 조합", "4박5일: 골드코스트 단독 / 7박8일: 골드코스트4+시드니3 / 호주 동부 일주."]]}, "퀸즈타운": {"항공권": [["왕복 평균가격", "비수기: 110~170만원 / 성수기: 170~300만원+. 인천→오클랜드 or 시드니 경유→퀸즈타운(ZQN). 직항 없음. 총 약 13~15시간."], ["성수기 시기", "① 남반구 여름(12~2월): 하이킹·아웃도어 최적. 밀포드 트랙 성수기. ② 스키 시즌(6~9월): 세계적 파우더 스노우, 리마커블스·코로넷 피크. ③ 크리스마스·연말. 퀸즈타운은 두 계절 모두 성수기인 독특한 구조."], ["비수기", "3~5월·10~11월: 어깨 시즌. 가격 합리적, 날씨는 온화."], ["예약 추천 시기", "스키 시즌·여름: 4~6개월 전. 밀포드 트랙: 수개월 전 예약 필수."]], "음식숙소주의": [["특산음식", "뉴질랜드 양고기(퀸즈타운 주변 목장 직송) / 초록입홍합(그린 머슬, 뉴질랜드 특산) / 파블로바(머랭 케이크, 뉴질랜드·호주 논쟁의 디저트) / 피시앤칩스(영국 영향) / 호키(흰살 생선, 뉴질랜드 원산지) / 마누카 허니(뉴질랜드 최고급 꿀)."], ["숙소 분포", "퀸즈타운 타운 센터: 레스토랑·바·쇼핑 근접, 중~고급. 아로우타운: 고풍스러운 금광 마을, 30분 거리. 글레노키: 반지의 제왕 배경, 고급 로지. 3성급 1박 NZD 150~280."], ["주의사항", "① NZeTA + 관광세(총 NZD 58) 미신청 시 탑승 거부 — 공식 앱 사전 신청. ② 번지점프·스카이다이빙: 심장 질환·임산부 참여 불가. 보험 커버 여부 사전 확인. ③ 밀포드 사운드 날씨 변덕 — 맑은 날 크루즈 가능, 당일 확인 필수. ④ 퀸즈타운 도로: 산악 도로 많음, 렌터카 운전 경험 필요."]], "연계": [["여행 패턴", "퀸즈타운 단독(4~5박) or 크라이스트처치·오클랜드 뉴질랜드 일주."], ["주요 연계 도시", "① 밀포드 사운드: 차량 4~5시간 or 비행기 35분. ② 크라이스트처치: 비행기 50분, 뉴질랜드 남섬 거점. ③ 오클랜드: 비행기 2시간, 뉴질랜드 최대 도시. ④ 와나카: 차량 1시간, 포토스팟 와나카 나무."], ["추천 조합", "4박5일: 퀸즈타운 단독 / 7박8일: 퀸즈타운4+밀포드+크라이스트처치2 / 뉴질랜드 남섬 일주 10박."]]}, "조지아·트빌리시": {"항공권": [["왕복 평균가격", "비수기: 80~130만원 / 성수기: 130~220만원. 인천→이스탄불·두바이·도하 경유→트빌리시(TBS). 직항 없음. 총 약 12~16시간."], ["성수기 시기", "① 봄(4~6월): 자연 아름답고 온화, 트레킹 최적. ② 가을(9~11월): 포도 수확 시즌, 와인 페스티벌. 트빌리시 성수기 자체는 유럽 대도시보다 훨씬 덜 붐빔. ③ 조지아 전통 축제(Rtveli 포도수확, 9~10월): 와인 투어 수요."], ["비수기", "겨울(12~2월): 추위. 카즈베기 스키 가능. 1~2월 가장 저렴. 관광객 적고 쾌적."], ["예약 추천 시기", "성수기: 2~3개월 전. 비수기: 1개월 전도 가능."]], "음식숙소주의": [["특산음식", "힌칼리(국물 가득 조지아 만두, 꼭지는 안 먹는 것이 전통) / 하차푸리(치즈 빵, 아다룰리=배 모양+달걀+버터) / 므츠바디(양고기·돼지고기 꼬치 바비큐) / 바디자니 니그브지트(가지+호두 페이스트 롤) / 처칠헬라(호두+고수 소시지 모양 과자) / 조지아 와인(크베브리 토기 항아리 발효, 앰버 와인 특색)."], ["숙소 분포", "구시가(아바노투바니·나리칼라 아래): 부티크 호텔·게스트하우스, 전통 분위기. 루스타벨리 대로: 중급 호텔. 베라·사불탈로: 현지인 주거지역, 저렴. 3성급 1박 100~200라리(약 50,000~100,000원). 유럽 대비 매우 저렴."], ["주의사항", "① 조지아 운전 문화 혼란 — 렌터카 운전 시 방어운전 필수, 신호 무시 빈번. ② 조지아 와인 폴리페놀 함량 높음 — 과음 시 두통 빠름, 절제 권장. ③ 카즈베기 날씨 급변 — 맑다가 갑자기 구름 끼어 게르게티 교회 안 보임, 이른 아침 방문 필수. ④ 물가 착각 주의: 트빌리시 구시가 관광 레스토랑은 현지 기준 비쌈 — 골목 안 현지 식당 이용 추천."]], "연계": [["여행 패턴", "트빌리시 단독(4~5박) or 트빌리시+카즈베기+므츠헤타 조지아 일주."], ["주요 연계 도시", "① 카즈베기: 버스 3시간, 코카서스 설산+게르게티 교회. ② 므츠헤타: 차량 30분, 유네스코 조지아 고도. ③ 쿠타이시: 비행기 45분, 서조지아 자연동굴. ④ 아르메니아 예레반: 버스 5~6시간."], ["추천 조합", "4박5일: 트빌리시+므츠헤타+카즈베기 / 6박7일: 트빌리시+카즈베기1박+므츠헤타+쿠타이시 / 코카서스 3국(조지아+아르메니아+아제르바이잔) 10박."]]}, "요르단·페트라": {"항공권": [["왕복 평균가격", "비수기: 110~170만원 / 성수기: 170~280만원+. 인천→두바이·이스탄불·도하 경유→암만(AMM). 직항 없음. 총 약 12~16시간."], ["성수기 시기", "① 봄(3~5월): 날씨 완벽, 페트라 트레킹 최적. 가장 인기. ② 가을(9~11월): 선선하고 맑음. ③ 크리스마스·연말: 기독교 성지 순례 연계 수요. 뚜렷한 성수기보다 중동 치안 상황 따라 가격 변동 큼."], ["비수기", "여름(6~8월): 페트라 낮 40°C+ 폭서 — 트레킹 매우 힘듦. 겨울(12~2월): 페트라 야간 추위."], ["예약 추천 시기", "봄·가을 성수기: 2~3개월 전. 비수기: 1개월 전도 가능."]], "음식숙소주의": [["특산음식", "만사프(양고기+요구르트 소스+밥, 요르단 국민 음식·결혼식 필수) / 파타(빵+고기+토마토소스+요구르트) / 팔라펠+후무스(중동 공통) / 마크루바(채소+쌀+고기 솥밥, '뒤집다' 의미) / 와디럼 베두인 잡(향신료 구덩이 구이)."], ["숙소 분포", "암만 시내: 중~고급 호텔(인터콘티넨탈·하얏트). 페트라 와디무사: 페트라 게이트 근접, 중급 호텔 다수. 와디럼: 베두인 캠프(럭셔리~기본). 사해 리조트: 사해 접근 리조트. 페트라 근처 3성급 1박 JOD 30~80(약 58,000~155,000원)."], ["주의사항", "① 요르단 패스 구매 강력 추천 — 비자비(JOD 40)+페트라 입장권(JOD 50+) 포함, 단독 구매보다 훨씬 저렴. ② 페트라 여름 방문: 오전 6~9시에만 트레킹, 이후 폭서로 탈진 위험. ③ 이슬람 문화: 라마단 기간 낮 음식 자제, 복장 규정. ④ 와디럼 사막: 모래 폭풍 가능 — 스카프·고글 지참."]], "연계": [["여행 패턴", "암만+페트라+와디럼+사해 요르단 내부 일주(5~6박)가 기본."], ["주요 연계 도시", "① 이스라엘 예루살렘: 육로 국경 3~4시간(비자 확인 필수). ② 이집트 카이로: 비행기 1시간. ③ 두바이: 비행기 2시간. ④ 아카바↔이집트 다합: 페리 1시간."], ["추천 조합", "5박6일: 암만1+페트라2+와디럼1박+사해1 / 7박8일: 암만+페트라+와디럼+사해+아카바 / 요르단+이스라엘 성지 순례 연계."]]}, "홍콩": {"항공권": [["왕복 평균가격", "비수기: 30~60만원 / 성수기: 65~130만원. 인천↔홍콩(HKG) 직항. 대한항공·아시아나·캐세이패시픽·제주항공 등. 저가항공 비수기 20만원대 가능."], ["성수기 시기", "① 10~12월: 기후 쾌청+홍콩 최고 시즌. ② 크리스마스·연말: 빅토리아 하버 카운트다운 불꽃+쇼핑. ③ 중국 구정(춘절): 중국 본토 방문객 급증. ④ 여름(7~8월): 폭서+태풍이나 할인 세일 시즌."], ["비수기", "여름(6~8월): 덥고 습함(35°C+). 태풍 시즌. 가격 저렴."], ["예약 추천 시기", "10~12월 성수기: 2~3개월 전. 연말: 4~5개월 전."]], "음식숙소주의": [["특산음식", "딤섬·얌차(홍콩 티하우스 전통, 팀호완·딘타이펑) / 완탄면(홍콩 스타일 새우 만두면) / 로스트 구스(거위 구이) / 에그 타르트(홍콩 포르투갈 식민지 영향) / 홍콩식 밀크티(강한 홍차+연유) / 파인애플 번(보로바오)."], ["숙소 분포", "침사추이(구룡): 중~고급, 야경 근접. 몽콕: 로컬 분위기, 저렴. 센트럴·셩완: 비즈니스 중~고급. 코즈웨이베이: 쇼핑 편리. 중급 호텔 1박 HKD 600~1,500(약 10~25만원)."], ["주의사항", "① 옥토퍼스 카드 필수 — 지하철·버스·트램·편의점·슈퍼마켓 통합. ② 홍콩 날씨 여름 폭서+태풍 — T8 이상 경보 시 교통·관광 전면 중단, 일정 여유 필수. ③ 란콰이퐁(나이트라이프) 야간 인파 극심 — 소매치기 주의. ④ 홍콩↔마카오 페리: 출국 수속 시간 여유 있게 확보."]], "연계": [["여행 패턴", "홍콩 단독(2~3박) or 홍콩+마카오 연계(4~5박)."], ["주요 연계 도시", "① 마카오: 페리 약 1시간. ② 선전(중국): MTR 경계역에서 도보 국경, 즉일 방문 가능. ③ 광저우: 고속열차 약 50분. ④ 타이베이: 비행기 1.5시간."], ["추천 조합", "2박3일: 홍콩 단독 / 4박5일: 홍콩3+마카오1 / 홍콩+광저우 차문화 투어."]]}, "마카오": {"항공권": [["왕복 평균가격", "비수기: 35~65만원 / 성수기: 70~130만원. 인천↔마카오(MFM) 직항(에어마카오·에어아시아 등) or 홍콩 경유. 홍콩 경유 시 더 저렴한 경우 많음."], ["성수기 시기", "홍콩과 동일. ① 10~12월. ② 크리스마스·연말. ③ 춘절. 마카오 그랑프리(11월): 세계 유일 도심 레이싱, 호텔 폭등."], ["비수기", "여름(6~8월): 태풍 시즌. 카지노 특성상 연중 방문객 꾸준."], ["예약 추천 시기", "마카오 그랑프리(11월): 6개월 전. 일반: 2~3개월 전."]], "음식숙소주의": [["특산음식", "에그 타르트(파스텔 드 나타, 포르투갈 원조 → 마카오 로컬화 / 로드 스토우스 베이커리 원조) / 포르투갈 치킨(갈리냐 아사다) / 아프리칸 치킨(마카오 퓨전, 땅콩+코코넛 소스) / 민치(다진 쇠고기+감자 볶음) / 세라두라(크림 마카오 디저트)."], ["숙소 분포", "코타이 스트립: 베네시안·파리지앙·MGM 대형 리조트, 카지노 내 호텔. 타이파·콜로안: 조용한 현지 마을 소규모 호텔. 마카오 반도: 유네스코 역사 지구 근접. 리조트 1박 MOP 600~3,000+(약 10~50만원)."], ["주의사항", "① 카지노: 21세 미만 입장 불가. 카지노 내 사진 촬영 금지. ② 홍콩과 별도 입출국 심사 — 여권 필수. ③ 마카오 타이파 구시가: 소규모 골목, 주말 인파 극심. ④ 마카오 달러(MOP)와 홍콩 달러(HKD) 대부분 혼용 가능하나 환율 확인."]], "연계": [["여행 패턴", "마카오 단독(1~2박)보다 홍콩+마카오 연계(4~5박)가 압도적으로 많음."], ["주요 연계 도시", "① 홍콩: 페리 약 1시간 / 홍콩 공항 터미널 직통 페리. ② 광저우: 버스 약 2시간. ③ 선전: 버스 약 2시간."], ["추천 조합", "홍콩3+마카오1~2 / 마카오 단독 1박2일: 야경+카지노+에그타르트."]]}, "타이베이": {"항공권": [["왕복 평균가격", "비수기: 20~50만원 / 성수기: 55~110만원. 인천↔타이베이 타오위안(TPE) 직항. 대한항공·아시아나·중화항공·에바항공·저가항공 다수. 가장 저렴한 해외 직항 중 하나."], ["성수기 시기", "① 봄(3~5월): 날씨 쾌청, 관광 최적. ② 가을(9~10월): 선선하고 맑음. ③ 연말연시·크리스마스. ④ 타이베이 란턴 페스티벌(음력 1월 15일): 대만 최대 축제 기간."], ["비수기", "여름(6~8월): 폭서 35°C+태풍. 겨울(12~2월): 흐리고 비 잦음."], ["예약 추천 시기", "봄·가을 성수기: 1~2개월 전. 비수기: 2주 전도 가능."]], "음식숙소주의": [["특산음식", "루러판(돼지고기 조림 덮밥, 대만 국민 음식) / 우육면(소고기 면, 린둥팡·용캉 우육면 유명) / 샤오룽바오(딘타이펑 원조) / 펑리수(파인애플 케이크, 기념품 1위) / 대만 버블티(첨차, 발상지) / 굴전(어아젠) / 지파이(닭다리 튀김, 야시장 명물)."], ["숙소 분포", "중정·다안: 101 근접, 중~고급. 시먼: 쇼핑+젊은층, 중급. 종산: 감성 카페 거리, 부티크 호텔. 다안공원 주변: 조용하고 고급. 3성급 1박 NT$2,000~4,500(약 8~18만원)."], ["주의사항", "① 이지카드(EasyCard): 지하철+버스+편의점+바이크 통합, 공항 MRT 연결. ② 스쿠터 렌트: 국제면허 필수, 대만 교통 혼잡. ③ 지진 대비: 대만 지진 다발 지역 — 호텔 비상구 위치 확인. ④ 야시장 음식 위생: 신선도 확인, 잘 익은 음식 위주로 선택."]], "연계": [["여행 패턴", "타이베이 단독(3~4박) or 타이베이+남부(타이난·가오슝) 연계."], ["주요 연계 도시", "① 지우펀·스펀: 버스+기차 약 1.5시간, 당일치기. ② 타이중: 고속열차 약 50분, 레인보우 빌리지. ③ 타이난: 고속열차 약 1.5시간, 역사 도시. ④ 가오슝: 고속열차 약 1시간 40분, 남부 최대 도시."], ["추천 조합", "3박4일: 타이베이 단독 / 5박6일: 타이베이3+타이중1+타이난1 / 대만 종단 고속철 여행."]]}, "보라카이": {"항공권": [["왕복 평균가격", "비수기: 40~75만원 / 성수기: 80~150만원. 인천→마닐라(MNL) or 칼리보(KLO) 경유→보라카이. 직항 없음. 총 약 8~10시간."], ["성수기 시기", "① 건기(11~5월): 화이트 비치 최상 컨디션. 12~4월 성수기 최고. ② 크리스마스·연말: 필리핀 최대 명절, 리조트 가격 폭등."], ["비수기", "우기(6~10월): 파도 높고 태풍 위험. 가격 40~50% 저렴."], ["예약 추천 시기", "건기 성수기: 2~3개월 전. 연말: 4~5개월 전."]], "음식숙소주의": [["특산음식", "이나살(필리핀 바비큐 치킨, 달콤한 마리네이드) / 크리스피 파타(바삭한 돼지 족발) / 씨푸드 BBQ(신선한 해산물 직화 구이) / 할로할로(빙수 디저트) / 코코넛 쉐이크(보라카이 명물 길거리 음료)."], ["숙소 분포", "화이트비치 S1(북쪽): 고급 리조트·조용. S2(중간): 가장 활기, 레스토랑·쇼핑. S3(남쪽): 나이트라이프·파티. D몰 주변: 쇼핑 편리 중급. 성수기 리조트 1박 5,000~25,000페소."], ["주의사항", "① 산호초 보호 구역 스노클링: 인증 가이드와 함께 → 무허가 접근 벌금. ② 건기 바람 시즌(11~4월 아미한): 보라카이 북동풍 강함 — 카이트서핑 최적이나 파라솔 날아감. ③ 공항(칼리보vs카티클란) 차이: 칼리보 저가 but 버스 1.5시간+보트 / 카티클란 소형기 but 항구 바로 옆. ④ 그랩 없음 — 삼륜차(트라이시클) 요금 사전 협의."]], "연계": [["여행 패턴", "보라카이 단독(4~5박)이 대부분. 세부 연계도 있음."], ["주요 연계 도시", "① 세부: 국내선 약 30분. ② 마닐라: 국내선 약 1시간. ③ 코론(팔라완): 국내선 약 1시간, 침몰선 다이빙."], ["추천 조합", "4박5일: 보라카이 단독 / 7박8일: 보라카이4+세부3 / 보라카이+코론 다이빙 연계."]]}, "보홀": {"항공권": [["왕복 평균가격", "비수기: 45~80만원 / 성수기: 85~160만원. 인천→마닐라 or 세부 경유→보홀(TAG). 총 약 8~12시간."], ["성수기 시기", "건기(11~5월)가 성수기. 세부와 동일 패턴."], ["비수기", "우기(6~10월): 비 잦음, 가격 저렴."], ["예약 추천 시기", "건기 성수기: 2~3개월 전."]], "음식숙소주의": [["특산음식", "씨푸드(보홀 해산물 직거래) / 필리핀 바비큐 / 레촌(통돼지 구이) / 카레카레(땅콩 소스 오크테일 스튜) / 치치라론(바삭 돼지껍데기 튀김)."], ["숙소 분포", "알로나 비치: 배낭여행자+다이버 중심, 저~중급 리조트. 팡라오섬 북쪽: 고급 리조트(아모리타·블러드 컴파스). 보홀 본섬 타그빌라란: 저렴한 비즈니스호텔. 알로나 비치 리조트 1박 2,000~8,000페소."], ["주의사항", "① 안경원숭이: 낮에는 잠자는 야행성 동물 — 플래시 촬영·접촉 금지(시력 손상 위험). ② 초콜릿힐: 건기(3~5월) 갈색 변색 최적. 우기는 녹색. ③ 발리카삭 다이빙: 조류 강함 — 반드시 가이드와 함께, 초보자 주의."]], "연계": [["여행 패턴", "세부 거점 보홀 2~3박 연계가 가장 많음."], ["주요 연계 도시", "① 세부: 고속선 2시간 or 비행기 25분. ② 팔라완: 국내선 연계."], ["추천 조합", "세부3+보홀2~3 / 세부+보홀+팔라완 7박8일."]]}, "코타키나발루": {"항공권": [["왕복 평균가격", "비수기: 30~60만원 / 성수기: 65~130만원. 인천↔코타키나발루(BKI) 직항. 에어아시아·제주항공·진에어 등. 저가항공 비수기 20만원대 가능."], ["성수기 시기", "① 건기(3~10월): 맑고 바다 최상. 특히 5~9월 성수기. ② 연말연시. 뚜렷한 단일 성수기보다 연중 고른 수요 — 기후 좋고 가성비 높아 한국인 꾸준."], ["비수기", "우기(11~2월): 비 잦고 파도 높음. 가격 저렴."], ["예약 추천 시기", "성수기: 2~3개월 전. 비수기: 1~2개월 전."]], "음식숙소주의": [["특산음식", "씨푸드(새우·가재·조개 직거래, 필리피노 마켓) / 바쿠테(돼지갈비 허브탕) / 낙시 르막(코코넛 밥+삼발 소스, 말레이 아침) / 힌두·무슬림 인도 음식(탄두리 치킨·로티 프라타) / 망고·두리안 등 열대과일."], ["숙소 분포", "시내(가야 스트리트): 중급 호텔·게스트하우스, 야시장 근접. 탄중아루 비치: 석양 명소, 중급 리조트. 가야섬·마무틱섬: 리조트 섬, 고급. 시내 3성급 1박 150~350링깃."], ["주의사항", "① 이슬람 문화: 모스크 방문 시 복장 규정. 술 공공장소 음주 주의. ② 키나발루산 등반: 반드시 사전 예약+공인 가이드 동반 필수(자유 등반 불가). ③ 해양 공원 입장료: 가야·마무틱 등 섬 방문 시 보전 비용 별도. ④ 두리안: 냄새 강해 호텔·교통수단 반입 금지."]], "연계": [["여행 패턴", "코타키나발루 단독(3~4박)이 대부분. 쿠알라룸푸르와 연계하는 말레이시아 패키지도 있음."], ["주요 연계 도시", "① 쿠알라룸푸르: 국내선 2.5시간. ② 랑카위: 국내선 2시간. ③ 라부안: 페리 2시간, 면세 섬."], ["추천 조합", "3박4일: 코타키나발루 단독 / 5박6일: 코타키나발루3+쿠알라룸푸르2 / 키나발루산 등반 포함 5박."]]}, "몰디브": {"항공권": [["왕복 평균가격", "비수기: 100~160만원 / 성수기: 170~300만원+. 인천→콜롬보·쿠알라룸푸르·싱가포르 경유→말레(MLE). 직항 없음. 총 약 10~14시간. 리조트 전용 수상비행기·스피드보트 별도 비용 추가."], ["성수기 시기", "① 건기(12~4월): 바다 맑고 최상. 12~2월 최고 성수기 — 허니문 수요 폭발. ② 크리스마스·연말: 리조트 1박 가격 2~3배. 6~11월 우기지만 수중 시야는 오히려 좋아 다이버 선호."], ["비수기", "우기(5~11월): 비 잦고 파도. 가격 30~50% 저렴. 다이빙 목적은 비수기도 OK."], ["예약 추천 시기", "허니문 리조트: 6개월~1년 전. 건기 성수기: 4~6개월 전. 비수기: 2~3개월 전."]], "음식숙소주의": [["특산음식", "마스 히우(참치+코코넛 커리, 몰디브 국민 음식) / 리하(참치+라임+코코넛, 아침 주식) / 갈라(참치 볶음+코코넛) / 리조트 식사: 고급 레스토랑·조식 뷔페(리조트 전용 식사 대부분 숙박비 포함 or 별도 패키지)."], ["숙소 분포", "수상 방갈로(오버워터 빌라): 바다 위 독채, 세계 최고 럭셔리 숙박. 비치 빌라: 해변 독채. 시티 아일랜드(말레): 저렴한 게스트하우스, 관광 목적에만 한정. 리조트 등급별 1박 $400~3,000+ — 최소 5박 이상 권장."], ["주의사항", "① 이슬람 국가: 공공 비치 비키니 금지, 리조트 섬 내부만 허용. 알코올 리조트 내부만 가능. ② 리조트 교통비: 수상비행기($300~600 편도) or 스피드보트($100~300)가 리조트 접근 필수 비용. ③ 허니문 데코 사전 요청: 꽃·케이크 서비스 최소 2~4주 전 이메일 요청. ④ 신혼여행 사전 학습: 물가 매우 비쌈(리조트 내 음료 한 잔 $10~20) — 예산 현실적으로 책정."]], "연계": [["여행 패턴", "몰디브 단독 리조트 5~7박이 일반적. 다른 도시 연계는 드물고 단일 목적 허니문 여행."], ["주요 연계 도시", "① 스리랑카 콜롬보: 비행기 1.5시간, 불교 문화+야생동물. ② 두바이: 비행기 3시간, 연계 허니문 패키지. ③ 싱가포르: 비행기 4시간, 경유 쇼핑."], ["추천 조합", "5~7박: 몰디브 단독 리조트 / 두바이3+몰디브5 허니문 패키지 / 싱가포르1+몰디브6."]]}, "방비엥": {"항공권": [["왕복 평균가격", "비수기: 60~110만원 / 성수기: 100~180만원. 인천→비엔티안(VTE) 경유→방비엥 기차 or 버스. 직항 없음. 총 약 10~14시간."], ["성수기 시기", "① 건기(10~4월): 맑고 최상. 12~2월 최고. ② 연말연시. ③ 송크란(4월): 태국+라오스 동시 축제."], ["비수기", "우기(5~9월): 카약·래프팅 일부 결항. 가격 저렴."], ["예약 추천 시기", "건기 성수기: 1~2개월 전. 비수기: 수주 전도 가능."]], "음식숙소주의": [["특산음식", "라오 카우니아오(찹쌀밥, 라오스 주식) / 포(쌀국수, 하노이 스타일 영향) / 라르프(고기+허브 다진 요리) / 팅모(라오스 찐빵) / 라오 비어(비어라오, 동남아 최고 맥주 중 하나로 현지인 인정) / 코코넛 팬케이크."], ["숙소 분포", "남쏭강변: 강뷰 게스트하우스·소규모 리조트 밀집, 가장 인기. 시내 중심: 저렴한 게스트하우스. 블루라군 인근: 소규모 에코 로지. 게스트하우스 1박 50,000~200,000킵(약 3,000~13,000원)."], ["주의사항", "① 강물 레벨 건기/우기 차이 큼 — 우기 카약·튜빙 결항 가능. ② 블루라군 줄 길고 사고 신고 증가 — 점프대 음주 상태 이용 금지. ③ 라오-중국 고속열차 시간표 확인 필수 — 하루 편수 적음. ④ 환전: 킵 현지 환전, 달러·태국 바트 일부 통용."]], "연계": [["여행 패턴", "비엔티안→방비엥→루앙프라방 고속열차 루트가 가장 인기."], ["주요 연계 도시", "① 비엔티안: 고속열차 약 1.5시간. ② 루앙프라방: 고속열차 약 1.5시간. ③ 치앙마이(태국): 버스 약 9시간."], ["추천 조합", "비엔티안1+방비엥2+루앙프라방2 라오스 5박 황금 루트."]]}, "루앙프라방": {"항공권": [["왕복 평균가격", "비수기: 70~120만원 / 성수기: 110~190만원. 인천→비엔티안 or 방콕 경유→루앙프라방(LPQ). 직항 없음. 총 약 10~14시간."], ["성수기 시기", "① 건기(10~4월): 맑고 최상. 12~2월 최고 성수기. ② 피마이 라오(라오스 새해, 4월 13~15일): 물 축제. ③ 송크란 전후."], ["비수기", "우기(5~9월): 메콩강 수위 높아 보트 투어 일부 변경. 가격 저렴. 꽝시 폭포 수량 많아 오히려 장관."], ["예약 추천 시기", "건기 성수기: 2~3개월 전. 비수기: 1개월 전."]], "음식숙소주의": [["특산음식", "카우삐약(쌀국수·라오스 스타일 닭국수) / 오르람(루앙프라방 전통 스튜) / 라오 커피(불란 커피, 진하고 달콤) / 바나나 팬케이크(배낭여행자 거리 명물) / 메콩강 이끼 튀김(시내 야시장 특산) / 라오 럼주(라오라오)."], ["숙소 분포", "왓씨엥통~왕궁박물관 구역: 유네스코 세계유산 중심, 부티크 호텔·방갈로. 메콩강변: 강뷰 게스트하우스·소규모 리조트. 야시장 주변: 저렴한 게스트하우스. 부티크 호텔 1박 500,000~2,000,000킵."], ["주의사항", "① 탁밧(새벽 탁발): 플래시 카메라 절대 금지, 큰 소리·접촉·코앞 촬영 금물 — 현지 경찰 단속. ② 사원 방문: 어깨·무릎 가리기 필수. ③ 꽝시 폭포 입장 오전 일찍: 오후 인파 극심. ④ 라오-중국 고속열차: 비엔티안·방비엥·루앙프라방 연결, 하루 편수 제한."]], "연계": [["여행 패턴", "방비엥→루앙프라방 고속열차 라오스 루트 or 루앙프라방 단독."], ["주요 연계 도시", "① 방비엥: 고속열차 약 1.5시간. ② 비엔티안: 고속열차 약 2시간. ③ 치앙마이(태국): 버스 약 12시간 or 비행기."], ["추천 조합", "비엔티안1+방비엥2+루앙프라방2 라오스 5박 / 루앙프라방 단독 3박 / 치앙마이+루앙프라방 태국+라오스 연계."]]}, "씨엠립": {"항공권": [["왕복 평균가격", "비수기: 50~90만원 / 성수기: 90~160만원. 인천→방콕·싱가포르·쿠알라룸푸르 경유→씨엠립(SAI). 직항 없음."], ["성수기 시기", "① 건기(11~4월): 앙코르와트 관광 최적, 먼지 적고 맑음. 12~2월 성수기. ② 연말연시: 최고 성수기."], ["비수기", "우기(5~10월): 앙코르 주변 초록 울창. 습하지만 여행 가능. 가격 저렴."], ["예약 추천 시기", "건기 성수기: 2~3개월 전."]], "음식숙소주의": [["특산음식", "아목(캄보디아 생선 코코넛 커리 찜) / 크레이 프(쌀국수 크메르 스타일) / 샬롯 볶음 쌀 / 프라혹(발효 생선 페이스트, 크메르 소울 음식) / 크메르 스타일 바베큐 / 앙코르 맥주."], ["숙소 분포", "시내(올드 마켓 주변): 부티크 호텔·게스트하우스, 앙코르 근접. 펍 스트리트: 나이트라이프 중심, 중급. 고급 리조트: 아만사라·소피텔·쉐라톤(앙코르와트 조망). 게스트하우스 1박 $10~30 / 리조트 $100~500."], ["주의사항", "① 앙코르 패스: 현장 공식 발권소에서만 구매(얼굴 사진 촬영). 사설·온라인 대행 모두 가짜. ② 일출 투어: 새벽 5시 도착 필요 — 전날 새벽 기상 준비. ③ 사원 복장: 어깨·무릎 가리기 필수. 반바지 입장 불가(사원마다 다름). ④ 오토바이·툭툭: 요금 사전 협의 필수."]], "연계": [["여행 패턴", "씨엠립 단독(3~4박)이 대부분. 프놈펜 연계도 가능."], ["주요 연계 도시", "① 프놈펜: 버스 6시간 or 비행기 45분, 캄보디아 수도. ② 방콕: 비행기 1시간 or 버스 8~10시간."], ["추천 조합", "3박4일: 씨엠립 단독 / 5박6일: 씨엠립3+프놈펜1+방콕1."]]}, "무이네": {"항공권": [["왕복 평균가격", "무이네 공항 없음. 호치민 직항 후 이동. 비수기: 25~55만원 / 성수기: 60~110만원."], ["성수기 시기", "건기(11~4월). 우기(5~10월) 키테서핑 시즌(반대 시즌에 바람 강함)."], ["비수기", "우기(5~10월): 비 잦음. 단, 키테서핑 목적 방문자는 이 시기 선호."], ["예약 추천 시기", "건기 성수기: 1~2개월 전."]], "음식숙소주의": [["특산음식", "씨푸드 바비큐(무이네 해안 신선 해산물) / 반깐(무이네 스타일 쌀 팬케이크) / 분짜(남부 베트남 스타일) / 바게트 반미."], ["숙소 분포", "무이네 해변 메인 로드: 리조트·호텔 해변가 연속 배치. 건기 중급 리조트 1박 500,000~2,000,000동."], ["주의사항", "① 사막 투어 일출 새벽 5시 지프 or ATV — 현지 가이드 고용 필수. ② 키테서핑 초보자: 반드시 강습 먼저. ③ 해안 침식 진행 중 — 일부 해변 좁아짐."]], "연계": [["여행 패턴", "호치민 거점 버스 4~5시간 or 달랏 연계."], ["주요 연계 도시", "① 호치민: 버스 4~5시간. ② 달랏: 버스 3시간, 고원 휴양. ③ 나트랑: 버스 5시간."], ["추천 조합", "호치민3+무이네2 / 나트랑+무이네+달랏 남부 베트남 루트."]]}, "푸꾸옥": {"항공권": [["왕복 평균가격", "비수기: 35~70만원 / 성수기: 75~140만원. 인천↔푸꾸옥(PQC) 직항(제주항공·베트남항공 등). 약 5시간."], ["성수기 시기", "① 건기(11~4월): 맑고 최상. 12~3월 최고. ② 연말연시: 빈원더스+해변 수요 폭발."], ["비수기", "우기(5~10월): 파도 높고 비 잦음. 가격 40% 이상 저렴."], ["예약 추천 시기", "건기 성수기: 2~3개월 전."]], "음식숙소주의": [["특산음식", "푸꾸옥 후추(세계 최고급 후추 산지) / 느억맘(피시소스, 푸꾸옥 원조) / 씨푸드 야시장(씬꼬우 야시장 해산물 직거래) / 해파리 냉채 / 성게 요리."], ["숙소 분포", "즈엉동 타운: 야시장 근접, 저~중급. 사오비치 남쪽: 럭셔리 리조트(JW메리어트·인터콘티넨탈). 빈원더스 인근: 빈펄 리조트 단지. 리조트 1박 2,000,000~10,000,000동."], ["주의사항", "① 무비자 30일: 30일 이내 재입국 불가(필리핀과 달리). ② 렌터카·스쿠터: 국제면허 필수, 도로 포장 불량 구간 있음. ③ 빈원더스: 입장료+케이블카 별도 비용 상당함 — 사전 예산 계획."]], "연계": [["여행 패턴", "푸꾸옥 단독(4~5박)이 대부분. 호치민 연계 가능."], ["주요 연계 도시", "① 호치민: 비행기 1시간 or 페리 9시간. ② 캄보디아 시아누크빌: 페리 약 3시간(국제 루트)."], ["추천 조합", "4박5일: 푸꾸옥 단독 / 호치민2+푸꾸옥4."]]}, "팔라완·코론": {"항공권": [["왕복 평균가격", "비수기: 50~90만원 / 성수기: 90~160만원. 인천→마닐라 경유→코론(USU) or 엘니도(ENI). 총 약 8~12시간."], ["성수기 시기", "건기(11~5월): 다이빙·스노클링 최상. 12~4월 최고."], ["비수기", "우기(6~10월): 태풍 위험, 보트 투어 결항 잦음."], ["예약 추천 시기", "건기 성수기: 2~3개월 전."]], "음식숙소주의": [["특산음식", "씨푸드(랍스터·새우·조개 현지 직거래) / 코코넛 크랩 / 필리핀 바비큐 / 할로할로."], ["숙소 분포", "코론 타운: 저~중급 게스트하우스·호텔. 엘니도: 배낭+중급 리조트 혼재. 리조트 섬(아레나섬·라겐섬): 럭셔리 에코 리조트. 1박 2,000~15,000페소."], ["주의사항", "① 침몰선 다이빙: 레크리에이션 다이빙 자격증(오픈워터 이상) 필수. ② 코론 날씨 갑작스런 변화 — 투어 결항 가능. ③ 엘니도 환경 보전비: 입장 시 200페소 별도 지불."]], "연계": [["여행 패턴", "코론 단독 or 엘니도 단독(3~4박) or 코론+엘니도 연계."], ["주요 연계 도시", "① 마닐라: 국내선 1~1.5시간. ② 세부: 국내선 1시간 이상."], ["추천 조합", "3박4일: 코론 or 엘니도 단독 / 6박7일: 코론3+엘니도3 / 세부+팔라완 연계."]]}, "아이슬란드": {"항공권": [["왕복 평균가격", "비수기: 150~220만원 / 성수기: 230~400만원+. 인천→코펜하겐·암스테르담·프랑크푸르트 경유→레이캬비크(KEF). 직항 없음. 총 약 15~18시간."], ["성수기 시기", "① 여름(6~8월): 백야, 하이킹·링로드 드라이브 최적. 최고 성수기. ② 오로라 시즌(9~3월): 오로라 목적 방문 별도 수요. 11~2월 오로라 확률 가장 높음."], ["비수기", "뚜렷한 비수기 없음. 4~5월·10월 어깨 시즌이 상대적으로 저렴."], ["예약 추천 시기", "여름 성수기: 4~6개월 전. 오로라 시즌: 2~3개월 전."]], "음식숙소주의": [["특산음식", "하카를(발효 상어 고기, 강한 암모니아 냄새 — 용감한 자만 도전) / 양고기 수프(킬루르) / 스카이르(아이슬란드 전통 요구르트 치즈) / 핫도그(바이야린스 베스타 — 레이캬비크 필수 명물) / 랍스터 수프(훔마르수파, 화남 랍스터 크림수프)."], ["숙소 분포", "레이캬비크 시내: 호텔·호스텔 다수. 링로드 중간: 게스트하우스·농가 숙박(에어비앤비 많음). 오로라 캠프: 북부 시골. 오로라 시즌 숙박 조기 예약 필수. 3성급 1박 €150~300."], ["주의사항", "① F-Road(내륙 산악 도로): 4WD 전용. 일반 2WD 진입 시 보험 무효, 렌터카 계약 위반. ② 날씨 급변: 아이슬란드 속담 '날씨가 마음에 안 들면 5분 기다려라' — 방풍·방수 장비 필수. ③ 블루라군 사전 예약: 사전 예약 없으면 입장 불가. ④ 오로라 예측: 100% 보장 불가 — 날씨·태양 활동 따라 달라짐."]], "연계": [["여행 패턴", "아이슬란드 단독(5~8박) or 북유럽 연계(코펜하겐·노르웨이 피오르)."], ["주요 연계 도시", "① 코펜하겐: 비행기 3시간. ② 런던: 비행기 3시간. ③ 오슬로: 비행기 2.5시간."], ["추천 조합", "5박6일: 아이슬란드 단독(골든서클+링로드) / 7박8일: 링로드 일주 / 북유럽 10박: 아이슬란드+노르웨이."]]}, "부다페스트": {"항공권": [["왕복 평균가격", "비수기: 90~150만원 / 성수기: 150~270만원+. 인천→프랑크푸르트·빈·이스탄불 경유→부다페스트(BUD). 직항 없음."], ["성수기 시기", "① 여름(6~8월): 관광 최성수기. ② 크리스마스 마켓(11월 말~12월): 유럽 최고 크리스마스 마켓 중 하나 — 성 이슈트반 광장·뵈뢰쉬마르티 광장. ③ 부다페스트 와인 페스티벌(9월)."], ["비수기", "1~3월·11월: 추위(-5~5°C). 관광객 적고 저렴. 온천은 겨울이 오히려 인기."], ["예약 추천 시기", "크리스마스 마켓: 4~5개월 전. 여름: 3~4개월 전."]], "음식숙소주의": [["특산음식", "굴라시(소고기+파프리카 스튜, 헝가리 국민 음식) / 랑고시(튀긴 밀가루 빵+사워크림+치즈, 길거리 음식) / 할라슬레(생선 수프) / 도보시 토르타(여러 층 초콜릿 케이크) / 토카이 와인(헝가리 귀부 와인, 세계적 명품) / 팔린카(과일 증류주)."], ["숙소 분포", "페스트(동쪽): 어반 호텔·게스트하우스 밀집, 관광 편리. 부다(서쪽, 왕궁 언덕): 조용하고 고급. 도나우 강변: 강뷰 고급 호텔. 3성급 1박 €60~120 / 동유럽 중 가성비 우수."], ["주의사항", "① 세체니 온천 평일 오전 방문 추천 — 주말 오후 인파 극심. ② 야간 나이트라이프: 부다페스트 '파티 도시' 명성, 음주 과다 사고 주의. ③ 환전: 유로보다 포린트(HUF) 사용, 시내 환전소(공식 환전소 이용, 공항 환율 불리). ④ 빈 연계: 기차 2.5시간, 동유럽 황금 루트."]], "연계": [["여행 패턴", "부다페스트 단독(2~3박) or 동유럽 3국(프라하+빈+부다페스트) 황금 루트."], ["주요 연계 도시", "① 빈: 기차 2.5시간. ② 프라하: 기차 7시간 or 버스 6시간. ③ 브라티슬라바: 버스 3시간, 슬로바키아 수도. ④ 류블랴나: 기차 7시간."], ["추천 조합", "2박3일: 부다페스트 단독 / 7박8일: 프라하2+빈2+부다페스트3 / 동유럽 10박 대장정."]]}, "빈": {"항공권": [["왕복 평균가격", "비수기: 100~160만원 / 성수기: 160~290만원+. 인천→프랑크푸르트·이스탄불·암스테르담 경유→빈(VIE). 오스트리아항공 직항(인천↔빈 2024년부터 운항)."], ["성수기 시기", "① 여름(6~8월): 관광+음악 페스티벌 시즌. ② 크리스마스 마켓(11월 말~12월): 라트하우스·쇤브룬·벨베데레 마켓 — 유럽 최고 수준. ③ 오스트리아 필하모닉 신년 음악회(1/1): 세계 생중계."], ["비수기", "1~3월·11월: 추위. 크리스마스 직전 비수기. 온천·미술관 관람은 연중 가능."], ["예약 추천 시기", "크리스마스 마켓: 4~6개월 전. 오페라·공연 티켓: 수개월 전."]], "음식숙소주의": [["특산음식", "자허 토르테(초콜릿 케이크, 자허 호텔 본점 필수) / 비너 슈니첼(송아지 돈가스, 피글뮐러 유명) / 타펠슈피츠(삶은 소고기+사과 홀라다이스) / 구글후프(링 모양 케이크) / 아인슈패너(크림 얹은 진한 커피) / 마리아 테레지아(오렌지 리큐어 커피)."], ["숙소 분포", "인넨슈타트(1구역): 관광 최적, 최고가. 마리아힐프·나슈마르크트: 쇼핑+중급. 프라터·레오폴트슈타트: 저렴한 편. 3성급 1박 €100~200."], ["주의사항", "① 뮤직페라인·오페라 관람: 적절한 복장(캐주얼 금지, 남성 정장·넥타이 권장). ② 빈 커피하우스: 신문 읽으며 오래 앉아있는 문화 — 자리 독촉 없음(유네스코 무형유산). ③ 자허 vs 데멜: 자허 토르테 원조 논쟁 — 두 곳 모두 먹어보기. ④ 잘츠부르크·할슈타트 당일치기: 기차 예약 사전 필수."]], "연계": [["여행 패턴", "빈 단독(3~4박) or 동유럽 3국 루트."], ["주요 연계 도시", "① 잘츠부르크: 기차 2.5시간. ② 할슈타트: 기차+버스 약 4시간. ③ 부다페스트: 기차 2.5시간. ④ 프라하: 기차 4시간."], ["추천 조합", "3박4일: 빈 단독 / 5박6일: 빈3+잘츠부르크1+할슈타트1 / 7박8일: 빈3+부다페스트2+프라하2."]]}, "암스테르담": {"항공권": [["왕복 평균가격", "비수기: 110~170만원 / 성수기: 180~320만원+. 인천↔암스테르담 스키폴(AMS) 직항(대한항공·KLM 등). 약 11.5시간."], ["성수기 시기", "① 튤립 시즌(3월 말~5월 중순): 케우켄호프+전국 튤립밭, 세계 최고 꽃 시즌. 4월 특히 인기. ② 여름(6~8월): 운하 보트·야외 테라스 최성수기. ③ 크리스마스(12월): 운하 라이트 페스티벌."], ["비수기", "1~2월·11월: 추위+비. 관광객 적고 저렴. 박물관 쾌적."], ["예약 추천 시기", "튤립 시즌: 4~6개월 전. 여름: 4~5개월 전."]], "음식숙소주의": [["특산음식", "헤링(생청어 절임, 손으로 들고 먹기 — 네덜란드 길거리 전통) / 스트로프와펠(캐러멜 샌드위치 쿠키) / 프리트(벨기에식 감자튀김+다양한 소스) / 하우다 치즈(고다 치즈, 암스테르담 치즈 상점) / 네덜란드 팬케이크(판넨쿠크) / 제네버(네덜란드 전통 진)."], ["숙소 분포", "담 광장·중앙역 주변: 관광 최적, 중~고급. 요르단·뮤지엄 플레인: 감성 중급 호텔. 암스테르담 서쪽: 저렴한 중급. 3성급 1박 €100~200."], ["주의사항", "① 자전거 도로: 자전거 전용 도로 위 보행 시 사고 위험 — 빨간 아스팔트 도로가 자전거 전용. ② 소매치기: 담 광장·중앙역·운하 트램 노선 주의. ③ 대마초: 일부 커피숍에서 합법 판매 — 미성년자 금지, 길거리 흡연 특정 구역 제한. ④ 수상 가옥 지구: 화재·침수 대비 생활 규정 있음, 숙박 체크인 시 주의사항 숙지."]], "연계": [["여행 패턴", "암스테르담 단독(3~4박) or 서유럽 연계(브뤼셀·파리·런던)."], ["주요 연계 도시", "① 브뤼셀: 탈리스 약 2시간. ② 파리: 탈리스 3.5시간. ③ 런던: 유로스타 4시간. ④ 쾰른: 기차 약 3시간."], ["추천 조합", "3박4일: 암스테르담 단독 / 7박8일: 암스테르담3+브뤼셀1+파리3 / 베네룩스 3국."]]}, "그리스": {"항공권": [["왕복 평균가격", "비수기: 110~180만원 / 성수기: 190~350만원+. 인천→이스탄불·프랑크푸르트·두바이 경유→아테네(ATH). 직항 없음."], ["성수기 시기", "① 여름(6~9월): 지중해 최고 성수기. 7~8월 산토리니 인파 폭발. ② 이스터(3~4월): 그리스 최대 종교 축제. ③ 허니문 성수기(4~10월): 성수기 내내 신혼 수요 높음."], ["비수기", "11~3월: 쌀쌀하고 일부 섬 서비스 축소. 사찰·박물관 여유롭게 관람 가능."], ["예약 추천 시기", "산토리니 이아 일몰뷰 숙박: 6개월~1년 전. 여름 성수기: 4~6개월 전."]], "음식숙소주의": [["특산음식", "수블라키(양고기·닭 꼬치 구이, 피타빵 포함) / 무사카(가지+간 고기 오븐 구이) / 타라마살라타(생선알 딥) / 그릭 샐러드(토마토·오이·페타 치즈·올리브) / 그릭 요구르트+꿀 / 우조(아니스 술, 투명→물 타면 뿌옇게)."], ["숙소 분포", "아테네 플라카 지구: 아크로폴리스 근접, 부티크 호텔. 산토리니 피라·이아: 동굴 호텔(케이브 하우스)·칼데라뷰 고급. 이아 일몰뷰: 1년 전 예약도 이른 편. 3성급 1박 €80~150(아테네), 산토리니 칼데라뷰 €300~1,000+."], ["주의사항", "① 산토리니 이아 일몰: 명당 자리 1~2시간 전 확보 필수, 인파 극심. ② 아크로폴리스: 관광지 중 접지력 낮은 대리석 계단 — 미끄러짐 사고 빈번, 방수 신발 주의. ③ 아테네 지하철 소매치기 주의. ④ 섬 페리: 시즌 성수기 매진 — 사전 예약 필수."]], "연계": [["여행 패턴", "아테네+산토리니(5~7박) 조합이 가장 인기."], ["주요 연계 도시", "① 산토리니↔아테네: 국내선 50분 or 페리 7~8시간. ② 미코노스: 페리 2~5시간, 파티 섬. ③ 크레타: 비행기 50분, 그리스 최대 섬. ④ 이스탄불: 비행기 1.5시간."], ["추천 조합", "5박6일: 아테네2+산토리니3 / 7박8일: 아테네2+미코노스2+산토리니3 / 그리스 섬 일주."]]}, "이스탄불": {"항공권": [["왕복 평균가격", "비수기: 70~120만원 / 성수기: 130~230만원+. 인천↔이스탄불(IST) 직항(터키항공·아시아나·대한항공 등). 약 11시간."], ["성수기 시기", "① 봄(4~6월): 날씨 최상, 관광 최적. ② 가을(9~10월): 선선하고 쾌청. ③ 여름(7~8월): 성수기 최고. 30~35°C 덥지만 투어 가능. ④ 라마단 기간: 종교 분위기 특별."], ["비수기", "겨울(12~2월): 비·안개. 관광객 적고 저렴. 실내 박물관·그랜드바자르 쇼핑은 연중 가능."], ["예약 추천 시기", "봄·가을: 2~3개월 전. 여름: 3~4개월 전."]], "음식숙소주의": [["특산음식", "되네르 케밥(세계로 퍼진 터키 원조) / 발릭 에크멕(고등어 샌드위치, 에미노뉘 선착장 명물) / 터키 아이스크림(돈두르마, 쭈욱 늘어나는 것) / 메제(터키 에피타이저 모음) / 바클라바(꿀+피스타치오 파이) / 터키 커피·차이(작은 튤립 잔)."], ["숙소 분포", "술탄아흐메트(구시가): 아야소피아·블루모스크 근접, 중~고급 부티크. 탁심·베욜루: 신시가 나이트라이프, 중급. 카드쿄이: 아시아 측 로컬, 저렴. 보스포러스 뷰: 고급 호텔. 3성급 1박 $60~150."], ["주의사항", "① 카펫 상점 초대 사기: '차 한잔 마시면서 구경만'이라며 고압 판매 — 강력히 거절. ② 택시 계량기 조작: 우버·BiTaksi 앱 사용 권장. ③ 환전: 공항 환율 불리, 시내 환전소(사설은 수수료 확인). ④ 람잔(라마단): 기간 중 낮 거리 음식 자제, 관광지 혼잡 패턴 변화."]], "연계": [["여행 패턴", "이스탄불 단독(4~5박) or 카파도키아 연계(총 6~8박)."], ["주요 연계 도시", "① 카파도키아: 비행기 1.5시간 or 야간버스 10시간, 열기구+기암. ② 파묵칼레: 버스 8시간 or 비행기+버스, 석회 온천 폭포. ③ 아테네: 비행기 1시간. ④ 두바이: 비행기 3.5시간."], ["추천 조합", "4박5일: 이스탄불 단독 / 7박8일: 이스탄불4+카파도키아3 / 터키 일주 10박."]]}, "올랜도·마이애미": {"항공권": [["왕복 평균가격", "비수기: 130~200만원 / 성수기: 200~370만원+. 인천→LA·달라스·뉴욕 경유→올랜도(MCO) or 마이애미(MIA). 직항 없음. 총 약 18~22시간."], ["성수기 시기", "① 여름 방학(6~8월): 가족 테마파크 수요 최고. 단, 폭서+허리케인 시즌. ② 크리스마스·연말(12월): 디즈니·유니버설 특별 이벤트. ③ 봄방학(3월): 스프링 브레이크."], ["비수기", "1~2월: 가족 여행객 적음. 기온 20~25°C 쾌적. 테마파크 대기 짧음. 강력 추천."], ["예약 추천 시기", "크리스마스·여름: 4~6개월 전. 비수기: 2~3개월 전."]], "음식숙소주의": [["특산음식", "올랜도: 테마파크 내 버터비어(해리포터)·디즈니 터키 레그 / 마이애미: 쿠바 샌드위치(리틀 아바나) / 스톤 크랩 클로(마이애미 특산, 10~5월 시즌) / 키라임 파이(플로리다 명물) / 구아바 파스텔리토(쿠바계 빵과자)."], ["숙소 분포
